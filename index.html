/* 教材セットの一括登録ウィザード。教材リスト（CSV）のセットをレベル範囲・
   期間・選択肢で絞り、allocateRoute で期間を割り当てて教材を一括生成する。 */
function openRouteWizard(){
  const routes = libRoutes(LIB());
  const subjects = Object.keys(routes);
  // 教材リスト未読込（またはセット情報なし）→ まず読み込みを案内
  if(!subjects.length){ openLibraryImport(); return; }
  let route = routes[subjects[0]];
  let LV = route.map(lv=>lv.level);
  const st = { subject:subjects[0], fromLevel:LV[0], toLevel:LV[LV.length-1],
               includeSS:true, picks:{}, off:{}, excluded:{} };

  const lvOpts = sel => LV.map(l=>`<option value="${esc(l)}" ${l===sel?"selected":""}>${esc(l)}</option>`).join("");
  const subOpts = sel => subjects.map(s=>`<option value="${esc(s)}" ${s===sel?"selected":""}>${esc(s)}</option>`).join("");
  const ov=document.createElement("div"); ov.className="overlay";
  ov.innerHTML=`<div class="modal">
    <h2>${t("教材セットを追加")}</h2>
    <div class="lead">${t("定番参考書のセットから、期間に合わせて全教材の計画を一括で立てます。")}</div>
    <div class="row2">
      <div class="field"><label>${t("教科")}</label><select id="rw-sub">${subOpts(st.subject)}</select></div>
      <div class="field"><label>${t("ゴールレベル")}</label><select id="rw-to">${lvOpts(st.toLevel)}</select></div>
    </div>
    <div class="row2">
      <div class="field"><label>${t("開始日")}</label><input type="date" id="rw-start" value="${todayStr()}"></div>
      <div class="field"><label>${t("終了日")}</label><input type="date" id="rw-end" value="${fmtD(addDays(new Date(),364))}"></div>
    </div>
    <div class="row2">
      <div class="field"><label>${t("開始レベル")}</label><select id="rw-from">${lvOpts(st.fromLevel)}</select></div>
      <div class="field"><label style="visibility:hidden">.</label>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;padding:9px 0">
          <input type="checkbox" id="rw-ss" checked style="accent-color:var(--vermilion)">${t("基礎固めの教材も含める")}</label></div>
    </div>
    <div class="field"><label>${t("含める教材と期間の割り当て")}</label>
      <div class="rw-list" id="rw-list"></div>
      <div class="rw-sum" id="rw-sum"></div>
      <div class="hint">${t("単語帳などは他の教材と並行して進める配分です。期間に収まらない復習回は教材ごとに自動で省きます。")}</div></div>
    <div class="err" id="rw-err"></div>
    <div class="modal-actions">
      <button class="btn ghost" id="rw-cancel">${t("キャンセル")}</button>
      <div class="right"><button class="btn accent" id="rw-save"></button></div>
    </div>
  </div>`;
  document.body.appendChild(ov);

  const $ = s => ov.querySelector(s);
  // step の現在の選択。one=グループのチェックがオフなら空・オンなら radio の選択
  // （既定は先頭）、any=追加した分、全冊step=個別チェックを外した分を除く。
  const chosen = stp =>
    stp.pick==="one" ? (st.off[stp.key] ? [] : (st.picks[stp.key] || [stp.books[0]]))
    : stp.pick==="any" ? (st.picks[stp.key] || [])
    : stp.books.filter(n=>!st.excluded[n]);
  function effPicks(){
    const picks = {};
    route.forEach(lv=>lv.steps.forEach((sp,si)=>{
      const key = lv.level+"|"+si;
      picks[key] = chosen({key, pick:sp.pick, books:sp.books});
    }));
    return picks;
  }
  function currentBooks(){
    return routePlanBooks(route, {fromLevel:st.fromLevel, toLevel:st.toLevel,
        includeSS:st.includeSS, picks:effPicks()}).map(b=>{
      const p = presetByName(b.name);
      return { name:b.name, count:p.count, unit:p.unit, par:b.par };
    });
  }
  function draw(){
    const err = $("#rw-err"); err.textContent="";
    const from = LV.indexOf(st.fromLevel), to = LV.indexOf(st.toLevel);
    const books = from<=to ? currentBooks() : [];
    const alloc = books.length ? allocateRoute(books, st.start, st.end) : null;
    const dates = {}; (alloc||[]).forEach(a=>{ if(a) dates[a.name]=a; });
    if(from>to) err.textContent = t("ゴールレベルは開始レベル以上にしてください。");
    else if(books.length && !alloc) err.textContent = t("期間が短すぎます。教材の冊数以上の日数が必要です。");

    let html="";
    route.forEach(lv=>{
      const li = LV.indexOf(lv.level);
      if(li<from || li>to) return;
      html += `<div class="rw-lv">${esc(lv.level)}</div>`;
      lv.steps.forEach((sp,si)=>{
        if(sp.ss && !st.includeSS) return;
        const key = lv.level+"|"+si;
        const sel = chosen({key, pick:sp.pick, books:sp.books});
        if(sp.pick==="one")
          html += `<label class="rw-choice"><input type="checkbox" data-type="g" data-key="${esc(key)}" ${st.off[key]?"":"checked"}>${t("1冊を選択")}</label>`;
        else if(sp.pick==="any")
          html += `<div class="rw-choice">${t("必要なら追加（任意）")}</div>`;
        sp.books.forEach(n=>{
          const on = sel.includes(n);
          const d = dates[n];
          // グループオフ中も radio の選択は保持して見せる（再オンで復元）
          const radioSel = sp.pick==="one" && (st.picks[key]||[sp.books[0]]).includes(n);
          const ctl = sp.pick==="one"
            ? `<input type="radio" name="rw-g-${esc(key)}" data-type="one" data-key="${esc(key)}" data-name="${esc(n)}" ${radioSel?"checked":""} ${st.off[key]?"disabled":""}>`
            : sp.pick==="any"
            ? `<input type="checkbox" data-type="any" data-key="${esc(key)}" data-name="${esc(n)}" ${on?"checked":""}>`
            : `<input type="checkbox" data-type="book" data-key="${esc(key)}" data-name="${esc(n)}" ${on?"checked":""}>`;
          html += `<label class="rw-row ${on?"":"off"}">${ctl}
            <span class="nm">${esc(n)}</span>
            ${sp.par?`<span class="rw-par">${t("並行")}</span>`:""}
            <span class="rw-cat">${t(sp.cat)}</span>
            <span class="rw-dates">${d ? esc(mdLabel(d.startDate)+"〜"+mdLabel(d.endDate))+"・"+tf("{d}日",{d:d.days}) : ""}</span>
          </label>`;
        });
      });
    });
    $("#rw-list").innerHTML = html;
    $("#rw-sum").textContent = tf("合計 {n} 冊",{n:books.length});
    $("#rw-save").textContent = tf("{n}冊で計画を立てる",{n:books.length});
    $("#rw-save").disabled = !books.length || !alloc;

    $("#rw-list").querySelectorAll("input").forEach(inp=>inp.onchange=()=>{
      const key = inp.dataset.key, name = inp.dataset.name, tp = inp.dataset.type;
      if(tp==="g"){ if(inp.checked) delete st.off[key]; else st.off[key]=true; }
      else if(tp==="one"){ st.picks[key] = [name]; }
      else if(tp==="any"){
        const cur = new Set(st.picks[key]||[]);
        inp.checked ? cur.add(name) : cur.delete(name);
        st.picks[key] = [...cur];
      }else{ // book: 全冊 step の個別チェック
        if(inp.checked) delete st.excluded[name]; else st.excluded[name]=true;
      }
      draw();
    });
  }
  st.start = $("#rw-start").value; st.end = $("#rw-end").value;
  ["#rw-sub","#rw-from","#rw-to","#rw-start","#rw-end","#rw-ss"].forEach(s=>{
    $(s).onchange = ()=>{
      if($("#rw-sub").value !== st.subject){
        // 教科が変わったら選択状態は引き継げない（キーは教科ごと）＝既定に戻す。
        // レベル構成も教科ごとに違うので選択肢を作り直す。
        st.subject = $("#rw-sub").value; route = routes[st.subject];
        LV = route.map(lv=>lv.level);
        st.picks={}; st.off={}; st.excluded={};
        st.fromLevel = LV[0]; st.toLevel = LV[LV.length-1];
        $("#rw-from").innerHTML = lvOpts(st.fromLevel);
        $("#rw-to").innerHTML = lvOpts(st.toLevel);
      }
      st.fromLevel=$("#rw-from").value; st.toLevel=$("#rw-to").value;
      st.includeSS=$("#rw-ss").checked;
      st.start=$("#rw-start").value; st.end=$("#rw-end").value;
      draw();
    };
  });
  draw();

  const close=()=>ov.remove();
  $("#rw-cancel").onclick=close;
  ov.addEventListener("mousedown",e=>{ if(e.target===ov) close(); });

  $("#rw-save").onclick=()=>{
    const err=$("#rw-err"); err.textContent="";
    if(LV.indexOf(st.fromLevel)>LV.indexOf(st.toLevel))
      return err.textContent=t("ゴールレベルは開始レベル以上にしてください。");
    if(!st.start||!st.end) return err.textContent=t("開始日と終了日を入力してください。");
    if(st.end<st.start) return err.textContent=t("終了日は開始日以降にしてください。");
    const books = currentBooks();
    if(!books.length) return err.textContent=t("登録する教材がありません。");
    const alloc = allocateRoute(books, st.start, st.end);
    if(!alloc) return err.textContent=t("期間が短すぎます。教材の冊数以上の日数が必要です。");
    const base = Date.now(), n0 = DB.materials().length;
    books.forEach((b,i)=>{
      const a = alloc[i];
      const mat = {
        id:"m"+(base+i).toString(36)+Math.floor(Math.random()*1e4).toString(36),
        color: PALETTE[(n0+i) % PALETTE.length],
        name:b.name, unit:b.unit, startDate:a.startDate, endDate:a.endDate,
        rangeStart:1, rangeEnd:b.count, excluded:"",
        reviews: fitReviews([1,3,7,28,56], a.days),
        excludeDates:[], excludeWeekdays:[], createdAt: Date.now()
      };
      DB.saveMaterial(mat, generatePlan(mat));
    });
    close();
    state.selected=null; state.view="plans"; render();
  };
}

function openForm(mat){
  const editing=!!mat;
  const m = mat || {
    name:"", unit:"problem", startDate:todayStr(),
    endDate:fmtD(addDays(new Date(),29)), rangeStart:1, rangeEnd:90,
    excluded:"", reviews:[1,3,7,28,56]
  };
  const exModel = { excludeDates:(m.excludeDates||[]).slice(), excludeWeekdays:(m.excludeWeekdays||[]).slice() };
  const ov=document.createElement("div"); ov.className="overlay";
  ov.innerHTML=`<div class="modal">
    <h2>${editing?t("教材を編集"):t("教材を追加")}</h2>
    <div class="lead">${t("条件から日毎の学習計画を自動で立案します。")}</div>
    <div class="field"><label>${t("教材名")}</label>
      <div class="sug-wrap">
        <input type="text" id="f-name" value="${esc(m.name)}" placeholder="${t("例）英単語帳・問題集の名前")}" autocomplete="off">
        <div class="sug-box" id="f-sug" style="display:none"></div>
      </div>
    </div>
    <div class="field"><label>${t("学習単位")}</label>
      <div class="unit-seg">
        <input type="radio" name="unit" id="u-page" value="page" ${m.unit==="page"?"checked":""}><label for="u-page">${t("ページ")}</label>
        <input type="radio" name="unit" id="u-prob" value="problem" ${m.unit==="problem"?"checked":""}><label for="u-prob">${t("問")}</label>
      </div></div>
    <div class="row2">
      <div class="field"><label>${t("開始日")}</label><input type="date" id="f-start" value="${m.startDate}"></div>
      <div class="field"><label>${t("終了日")}</label><input type="date" id="f-end" value="${m.endDate}"></div>
    </div>
    <div class="field"><label>${t("学習範囲")}</label>
      <div class="row3">
        <input type="number" id="f-rs" value="${m.rangeStart}" min="1">
        <span class="dash">〜</span>
        <input type="number" id="f-re" value="${m.rangeEnd}" min="1">
      </div></div>
    <details class="xfold" ${(editing && (m.excluded || exModel.excludeDates.length || exModel.excludeWeekdays.length))?"open":""}>
      <summary>${t("除外の設定")}<span class="xfold-sub">${t("曜日・日付・ページを計画から除く")}</span></summary>
      <div class="xfold-body">
        <div class="field"><label>${t("除外ページ・問題")}</label>
          <input type="text" id="f-ex" value="${esc(m.excluded||"")}" placeholder="${t("例）5, 12, 20-24")}">
          <div class="hint">${t("計画から除く番号。カンマ区切り・範囲指定(20-24)が使えます。")}</div></div>
        <div id="f-dayex"></div>
      </div>
    </details>
    <div class="field"><label>${t("復習設定")}</label>
      <div class="reviews" id="f-reviews"></div>
      <button type="button" class="btn ghost sm add-rev" id="f-addrev">${t("＋ 復習を追加")}</button>
      <div class="hint">${t("各復習を新規学習の何日後に行うか。重複はできません。")}</div></div>
    <div class="err" id="f-err"></div>
    <div class="modal-actions">
      <button class="btn ghost" id="f-cancel">${t("キャンセル")}</button>
      <div class="right"><button class="btn accent" id="f-save">${editing?t("更新する"):t("計画を立てる")}</button></div>
    </div>
  </div>`;
  document.body.appendChild(ov);
  exclusionControls(ov.querySelector("#f-dayex"), exModel);

  let revs = m.reviews.slice();
  const revWrap = ov.querySelector("#f-reviews");
  function drawRevs(){
    revWrap.innerHTML="";
    revs.forEach((v,i)=>{
      const row=document.createElement("div"); row.className="rev-row";
      row.innerHTML=`<span class="rk">${reviewName(i+1)}</span>
        <input type="number" min="1" value="${v}" data-i="${i}"><span class="unit-d">${t("日後")}</span>
        <button class="del" data-i="${i}" title="${t("削除")}">×</button>`;
      revWrap.appendChild(row);
    });
    revWrap.querySelectorAll("input").forEach(inp=>inp.onchange=()=>{ revs[+inp.dataset.i]=Math.max(1,Math.round(+inp.value)||1); });
    revWrap.querySelectorAll(".del").forEach(b=>b.onclick=()=>{ revs.splice(+b.dataset.i,1); drawRevs(); });
  }
  drawRevs();
  ov.querySelector("#f-addrev").onclick=()=>{ const last=revs[revs.length-1]||0; revs.push(last+ (revs.length?Math.max(1,last):1)); drawRevs(); };

  // ---- 教材名の入力候補（教材リスト） ----
  // 入力が空＝教科チップ（タップでその教科のルート一式）、入力あり＝presetMatch の結果。
  // 表示順は教材リストの行順（教科→レベル→取り組む順）を保つ。
  // 教材リスト未読込のときは候補を出さない（手入力はそのまま可能）。
  const nameInp = ov.querySelector("#f-name");
  const sugBox = ov.querySelector("#f-sug");
  let sugSubject = null;   // チップで選んだ教科（入力が空の間だけ有効）

  function hideSug(){ sugBox.style.display="none"; sugBox.innerHTML=""; sugBox._list=null; }
  function applyPreset(p){
    nameInp.value = p.name;
    ov.querySelector(p.unit==="page" ? "#u-page" : "#u-prob").checked = true;
    ov.querySelector("#f-rs").value = 1;
    ov.querySelector("#f-re").value = p.count;
    hideSug();
  }
  function renderSug(){
    const lib = LIB();
    if(!lib.length){ hideSug(); return; }
    const q = nameInp.value.trim();
    let list;
    if(q){ list = presetMatch(q, lib); }
    else if(sugSubject){ list = lib.filter(p=>p.subject===sugSubject); }
    else{
      sugBox.innerHTML = `<div class="sug-chips"><span class="lead-s">${t("教材リストから選ぶ（教科をタップ）")}</span>`
        + libSubjects(lib).map(s=>`<button type="button" class="sug-chip" data-s="${esc(s.name)}">${esc(s.name)}</button>`).join("")
        + `</div>`;
      sugBox.style.display="block"; sugBox._list=null;
      return;
    }
    if(!list.length){ hideSug(); return; }
    let html="", lastHead="";
    list.forEach((p,i)=>{
      if(p.subject!==lastHead){ html += `<div class="sug-head">${esc(p.subject)}</div>`; lastHead=p.subject; }
      html += `<div class="sug-item" data-i="${i}"><span class="nm">${esc(p.name)}</span>`
        + `<span class="lv">${esc(p.level)}</span>`
        + `<span class="pg">${p.count}${unitLabel(p.unit)}</span></div>`;
    });
    sugBox.innerHTML = html; sugBox.style.display="block"; sugBox._list = list;
  }
  nameInp.addEventListener("input", ()=>{ sugSubject=null; renderSug(); });
  nameInp.addEventListener("focus", renderSug);
  // 候補内のタップでは input の blur を起こさない（blur→hide より先に click を通す）
  sugBox.addEventListener("pointerdown", e=>e.preventDefault());
  sugBox.addEventListener("click", e=>{
    const chip = e.target.closest(".sug-chip");
    if(chip){ sugSubject = chip.dataset.s; renderSug(); return; }
    const it = e.target.closest(".sug-item");
    if(it && sugBox._list) applyPreset(sugBox._list[+it.dataset.i]);
  });
  nameInp.addEventListener("blur", ()=>setTimeout(()=>{ if(document.activeElement!==nameInp) hideSug(); },150));

  const close=()=>ov.remove();
  ov.querySelector("#f-cancel").onclick=close;
  ov.addEventListener("mousedown",e=>{ if(e.target===ov) close(); });

  ov.querySelector("#f-save").onclick=()=>{
    const err=ov.querySelector("#f-err"); err.textContent="";
    const name=ov.querySelector("#f-name").value.trim();
    const unit=ov.querySelector('input[name=unit]:checked').value;
    const startDate=ov.querySelector("#f-start").value;
    const endDate=ov.querySelector("#f-end").value;
    const rangeStart=Math.round(+ov.querySelector("#f-rs").value);
    const rangeEnd=Math.round(+ov.querySelector("#f-re").value);
    const excluded=ov.querySelector("#f-ex").value.trim();

    if(!name) return err.textContent=t("教材名を入力してください。");
    if(!startDate||!endDate) return err.textContent=t("開始日と終了日を入力してください。");
    if(endDate<startDate) return err.textContent=t("終了日は開始日以降にしてください。");
    if(!(rangeStart>=1)||!(rangeEnd>=rangeStart)) return err.textContent=t("学習範囲が正しくありません。");
    const sorted=revs.slice().sort((a,b)=>a-b);
    if(new Set(sorted).size!==sorted.length) return err.textContent=t("復習タイミングが重複しています。重複しない日数を指定してください。");
    revs=sorted;
    const items=buildItems({rangeStart,rangeEnd,excluded});
    if(!items.length) return err.textContent=t("除外指定により学習範囲が空になっています。");

    const newMat={
      id: m.id || ("m"+Date.now().toString(36)+Math.floor(Math.random()*1e4).toString(36)),
      color: m.color || PALETTE[DB.materials().length % PALETTE.length],
      name, unit, startDate, endDate, rangeStart, rangeEnd, excluded, reviews:revs,
      excludeDates: exModel.excludeDates.slice(), excludeWeekdays: exModel.excludeWeekdays.slice(),
      createdAt: m.createdAt || Date.now()
    };
    // Only rebuild the plan (which wipes手編集/実績) when a field that actually
    // shapes the plan changed. A cosmetic edit (e.g. just renaming) keeps the
    // existing entries. To re-apply 共通除外日 or discard manual edits, use 再生成.
    // 期間（開始/終了日）だけの変更はガントのリサイズと同じ扱い＝実績・過去は
    // そのまま残し、未消化分だけを新期間へ配り直す（replanPeriod）。
    const shapeFields = mm => [mm.rangeStart, mm.rangeEnd, mm.excluded||"",
      (mm.reviews||[]).slice().sort((a,b)=>a-b).join(","),
      (mm.excludeDates||[]).slice().sort().join(","),
      (mm.excludeWeekdays||[]).slice().sort((a,b)=>a-b).join(",")].join("|");
    const shapeChanged = !editing || shapeFields(m)!==shapeFields(newMat);
    const periodChanged = editing && (m.startDate!==newMat.startDate || m.endDate!==newMat.endDate);
    if(shapeChanged){
      if(editing && !confirm(t("計画を作り直します。手入力した予定・実績はリセットされます。よろしいですか？"))) return;
      DB.saveMaterial(newMat, generatePlan(newMat));
    }else if(periodChanged){
      if(!confirm(t("期間を変更し、今日以降の未消化分の計画を作り直します。実績と過去の予定はそのまま残ります。よろしいですか？"))) return;
      DB.saveMaterial(newMat, replanPeriod(newMat, DB.entriesFor(m.id),
        newMat.startDate, newMat.endDate, buildDayExcluder(newMat), todayStr()));
    }else{
      DB.saveMaterial(newMat, DB.entriesFor(m.id)); // 計画に影響しない変更＝既存の予定・実績を維持
    }
    close();
    // 追加/編集後は詳細（予実表）を開く。戻り先タブは今いる場所を維持
    // （全体計画表から追加→閉じると全体計画表へ）。「これから」だけは計画一覧へ。
    state.selected=newMat.id; if(state.view==="today") state.view="plans"; render();
  };
}

/* ---- 初回オンボーディング（歓迎ガイド・カード式） ----
   ストア公開で初見ユーザーが触る前提の「冷たいインストール」対策。
   既存ロジックには一切触れず、他のモーダルと同じ .overlay として作るので、
   戻るボタンの履歴同期（uiLayerCount／MutationObserver）とも自然に整合する。
   初回表示の判定は localStorage フラグ studyplan.onboarded で管理＝テーマと同じ
   「端末ローカルの UI 設定」なので export/import の対象外（=新端末では再表示）。 */
const ONBOARD_STEPS = [
  { mark:"学", title:"学習計画手帳へようこそ",
    body:"紙の参考書・問題集を<b>「ページ／問の範囲」</b>で計画するアプリです。新しく学ぶ分に加えて、<b>復習①〜⑤</b>を間隔をあけて自動でスケジュールします。" },
  { mark:"＋", title:"まず教材を追加",
    body:"<b>「＋ 教材を追加」</b>で、教材名・範囲・期間・除外したい曜日や日付を入れるだけ。日毎の学習計画が<b>自動で立案</b>されます。" },
  { mark:"予", title:"予実表で予定と実績を管理",
    body:"教材を開くと<b>予実表</b>。新規と復習の予定、実績を一覧できます。範囲のマスを<b>クリックで問数を編集</b>、<b>ドラッグで日付を移動</b>、ヘッダーの<b>「ずらす」</b>である日以降をまとめて前後にずらせます。" },
  { mark:"今", title:"「今日」タブで今日の分だけ",
    body:"今日やる学習だけを抜き出して表示します。<b>チェックを入れると実績</b>になり、進捗に反映されます。" },
  { mark:"控", title:"保存とバックアップ",
    body:"データは<b>この端末の中だけ</b>に保存します（外部へ送信しません）。機種変更や端末を増やすときは<b>「⤓ エクスポート」</b>でバックアップし、新しい端末で<b>「⤒ 復元」</b>してください。" }
];
function openOnboarding(){
  let step=0;
  const ov=document.createElement("div"); ov.className="overlay";
  document.body.appendChild(ov);
  const close=()=>ov.remove();
  function draw(){
    const s=ONBOARD_STEPS[step];
    const last = step===ONBOARD_STEPS.length-1;
    const dots = ONBOARD_STEPS.map((_,i)=>`<i class="${i===step?'on':''}"></i>`).join("");
    ov.innerHTML=`<div class="modal onboard">
      <div class="ob-mark">${s.mark}</div>
      <div class="ob-title">${t(s.title)}</div>
      <div class="ob-body">${t(s.body)}</div>
      ${last?`<div class="ob-legal"><a href="https://eastoceanhelp.github.io/privacy.html" target="_blank" rel="noopener">${t("プライバシーポリシー・免責事項")}</a></div>`:""}
      <div class="ob-dots">${dots}</div>
      <div class="ob-actions">
        <button class="btn ghost sm" id="ob-skip">${last?t("閉じる"):t("スキップ")}</button>
        <div class="right">
          ${step>0?`<button class="btn ghost" id="ob-prev">${t("← 戻る")}</button>`:""}
          ${last
            ? `<button class="btn ghost" id="ob-sample">${t("サンプルを見る")}</button><button class="btn accent" id="ob-add">${t("＋ 教材を追加")}</button>`
            : `<button class="btn accent" id="ob-next">${t("次へ →")}</button>`}
        </div>
      </div>
    </div>`;
    ov.querySelector("#ob-skip").onclick=close;
    const prev=ov.querySelector("#ob-prev"); if(prev) prev.onclick=()=>{ step--; draw(); };
    const next=ov.querySelector("#ob-next"); if(next) next.onclick=()=>{ step++; draw(); };
    const sample=ov.querySelector("#ob-sample"); if(sample) sample.onclick=()=>{ close(); createSample(); };
    const add=ov.querySelector("#ob-add"); if(add) add.onclick=()=>{ close(); openForm(); };
  }
  draw();
  ov.addEventListener("mousedown",e=>{ if(e.target===ov) close(); });
}

/* =========================================================================
   Backup: export / import the whole dataset as a JSON file.
   ========================================================================= */
function exportData(){
  if(!DB.materials().length){ alert(t("エクスポートする教材がありません。")); return; }
  const payload = {
    app:"studyplan", version:1,
    exportedAt:new Date().toISOString(),
    data: DB.exportData()
  };
  const blob = new Blob([JSON.stringify(payload,null,2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `studyplan-backup-${todayStr()}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}
function importData(){
  const inp = document.createElement("input");
  inp.type = "file"; inp.accept = "application/json,.json";
  inp.onchange = ()=>{
    const file = inp.files && inp.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ()=>{
      try{
        const parsed = JSON.parse(reader.result);
        const data = parsed && parsed.data ? parsed.data : parsed; // accept raw {materials,entries} too
        if(!data || !Array.isArray(data.materials) || !Array.isArray(data.entries))
          throw new Error(t("教材／計画データが見つかりません"));
        const mc = data.materials.length, ec = data.entries.length;
        if(!confirm(tf("バックアップを読み込みます。\n教材 {mc}件 ／ 計画 {ec}件\n\n現在のデータはすべて置き換えられます。よろしいですか？",{mc,ec}))) return;
        DB.replaceAll(data);
        state.selected = null; state.view = "plans";
        document.querySelectorAll("#tabs button").forEach(x=>x.classList.toggle("active", x.dataset.view==="plans"));
        render();
        alert(tf("インポートが完了しました。（教材 {mc}件）",{mc}));
      }catch(err){
        alert(t("インポートに失敗しました。正しいバックアップファイルか確認してください。")+"\n("+err.message+")");
      }
    };
    reader.readAsText(file);
  };
  inp.click();
}

    <div class="field"><div class="hint" style="margin-top:0">${esc(stat)}</div></div>
    <div class="field"><div class="hint" style="margin-top:0">${t("CSVの列: subject, level, step, cat, pick, par, ss, name, kana, count, unit（必須は subject / name / count / unit）。文字コードはUTF-8。")}</div></div>
    <div class="err" id="lib-err" style="white-space:pre-line"></div>
    <div class="modal-actions">
      <button class="btn ghost" id="lib-cancel">${t("閉じる")}</button>
      <div class="right">
        ${lib.books.length?`<button class="btn ghost" id="lib-clear">${t("リストを消去")}</button>`:""}
        <button class="btn accent" id="lib-file">${t("CSVファイルを選ぶ")}</button>
      </div>
    </div>
  </div>`;
  document.body.appendChild(ov);
  const close=()=>ov.remove();
  ov.querySelector("#lib-cancel").onclick=close;
  ov.addEventListener("mousedown",e=>{ if(e.target===ov) close(); });
  const clearB = ov.querySelector("#lib-clear");
  if(clearB) clearB.onclick=()=>{
    if(!confirm(t("教材リストを消去します。登録済みの計画には影響しません。よろしいですか？"))) return;
    DB.clearLibrary(); close();
  };
  ov.querySelector("#lib-file").onclick=()=>{
    const inp = document.createElement("input");
    inp.type = "file"; inp.accept = "text/csv,.csv,text/plain,.txt";
    inp.onchange = ()=>{
      const file = inp.files && inp.files[0]; if(!file) return;
      const reader = new FileReader();
      reader.onload = ()=>{
        const {books, errors} = parseLibraryCSV(reader.result);
        const errBox = ov.querySelector("#lib-err");
        if(!books.length){
          errBox.textContent = t("読み込める行がありませんでした。")+"\n"+errors.slice(0,5).join("\n");
          return;
        }
        if(errors.length &&
           !confirm(tf("{e}行に問題があります（読み飛ばします）。\n\n{d}\n\n正しい {n}冊 を読み込みますか？",
             {e:errors.length, d:errors.slice(0,5).join("\n"), n:books.length}))) return;
        DB.saveLibrary(books);
        close();
        alert(tf("教材リストを読み込みました。（{n}冊）",{n:books.length}));
        render();
      };
      reader.readAsText(file);   // UTF-8（BOMは parseCSV が除去）
    };
    inp.click();
  };
}

function esc(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

/* =========================================================================
   ポモドーロタイマー
   時計に揃えたチャイム＝毎時 0分・30分に「学習開始」、25分・55分に「休憩開始」
   （25分学習＋5分休憩）。開始（今すぐ／時刻指定）から終了時刻まで鳴り、
   終了時刻になると終了チャイムで自動停止する。
   実行状態はメモリのみ＝アプリを開いている間だけ動く（ページを閉じると止まる）。
   前回の終了時刻などはテーマと同じ端末ローカルの UI 設定として
   localStorage（studyplan.pomodoro）に覚える＝export/import の対象外。
   ========================================================================= */
const POMO_MINUTES = [0, 25, 30, 55];

/* d より厳密に後の、最初のチャイム時刻を返す（純粋関数・テスト対象）。
   「厳密に後」＝境界ちょうどで呼ばれても同じ境界を二度返さない。 */
function pomoNextBoundary(d){
  const c = new Date(d.getTime());
  c.setSeconds(0, 0);
  for(const m of POMO_MINUTES){
    c.setMinutes(m);
    if(c.getTime() > d.getTime()) return c;
  }
  c.setMinutes(60);            // 55分より後 → 次の時の0分（日跨ぎは Date が処理）
  return c;
}
/* その時刻が学習中(work)か休憩中(break)か（純粋関数・テスト対象） */
function pomoPhaseAt(d){
  const m = d.getMinutes();
  return (m >= 25 && m < 30) || m >= 55 ? "break" : "work";
}

const pomo = { running:false, startAt:null, endAt:null, next:null, timerId:null, wakeLock:null, keepAwake:false };
let pomoAudioCtx = null;   // 「開始する」クリック＝ユーザー操作の中で生成（自動再生制限対策）

/* チャイム（WebAudio）。音が出せない環境でも例外で止めない。 */
function pomoChime(kind){ // "start"=開始確認 / "work"=学習開始 / "break"=休憩開始 / "end"=終了
  try{
    if(!pomoAudioCtx) return;
    if(pomoAudioCtx.state === "suspended") pomoAudioCtx.resume();
    const seq = kind==="start" ? [[880,0]] :
                kind==="work"  ? [[660,0],[880,.25]] :          // 上がる2音＝学習へ
                kind==="break" ? [[880,0],[660,.25]] :          // 下がる2音＝休憩へ
                                 [[880,0],[660,.3],[440,.6]];   // 3音＝終了
    seq.forEach(([f,t])=>{
      const o = pomoAudioCtx.createOscillator(), g = pomoAudioCtx.createGain();
      o.type = "sine"; o.frequency.value = f;
      const at = pomoAudioCtx.currentTime + t;
      g.gain.setValueAtTime(0, at);
      g.gain.linearRampToValueAtTime(kind==="start" ? .15 : .4, at + .02);
      g.gain.exponentialRampToValueAtTime(.0001, at + .7);
      o.connect(g); g.connect(pomoAudioCtx.destination);
      o.start(at); o.stop(at + .75);
    });
  }catch(e){}
  if(kind!=="start" && navigator.vibrate)
    navigator.vibrate(kind==="end" ? [250,120,250,120,250] : kind==="break" ? [120,80,120] : [250,120,250]);
}

/* 画面スリープ抑止（対応ブラウザのみ）。画面が消えると JS のタイマーが止まり
   チャイムが鳴らないことがあるため、実行中は画面を点けたままにする選択肢。 */
function pomoWake(on){
  if(!("wakeLock" in navigator)) return;
  if(on){
    navigator.wakeLock.request("screen").then(l=>{ pomo.wakeLock = l; }).catch(()=>{});
  }else if(pomo.wakeLock){
    try{ pomo.wakeLock.release(); }catch(e){}
    pomo.wakeLock = null;
  }
}
document.addEventListener("visibilitychange", ()=>{  // タブ復帰時はロックが失効しているので取り直す
  if(pomo.running && pomo.keepAwake && document.visibilityState==="visible") pomoWake(true);
});

function pomoFmtHM(d){ return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); }
function pomoRemainStr(ms){
  const s = Math.max(0, Math.ceil(ms/1000));
  return Math.floor(s/60) + ":" + String(s%60).padStart(2,"0");
}
/* 次に鳴る時刻＝次のチャイムと終了時刻の早い方 */
function pomoTarget(){
  return (pomo.next && pomo.next.getTime() <= pomo.endAt.getTime()) ? pomo.next : pomo.endAt;
}

function pomoStart(startAt, endAt, keepAwake){
  pomo.running = true; pomo.startAt = startAt; pomo.endAt = endAt; pomo.keepAwake = keepAwake;
  const now = new Date();
  // 未来開始なら開始時刻ちょうどの境界（例 15:00）も鳴らす。今すぐなら次の境界から。
  pomo.next = startAt > now ? pomoNextBoundary(new Date(startAt.getTime()-1)) : pomoNextBoundary(now);
  pomo.timerId = setInterval(pomoTick, 500);
  if(keepAwake) pomoWake(true);
  pomoUpdateNav();
}
function pomoStop(){
  pomo.running = false; pomo.next = null;
  if(pomo.timerId){ clearInterval(pomo.timerId); pomo.timerId = null; }
  pomoWake(false);
  pomoUpdateNav(); pomoUpdatePanel();
}
function pomoTick(){
  if(!pomo.running) return;
  const now = new Date();
  if(now.getTime() >= pomo.endAt.getTime()){ pomoChime("end"); pomoStop(); return; }
  if(pomo.next && now.getTime() >= pomo.next.getTime()){
    pomoChime(pomoPhaseAt(pomo.next));
    pomo.next = pomoNextBoundary(now);  // スリープ等で複数境界を飛んでいても鳴らすのは1回
  }
  pomoUpdateNav(); pomoUpdatePanel();
}

function pomoUpdateNav(){
  const b = document.getElementById("menuBtn"); if(!b) return;
  if(!pomo.running){
    b.textContent = "☰"; b.classList.remove("on"); b.title = t("メニュー");
    return;
  }
  b.classList.add("on");
  b.textContent = "☰ " + pomoRemainStr(pomoTarget().getTime() - Date.now());
  b.title = t("ポモドーロ実行中（タップで詳細）");
}

/* 実行中パネルの表示更新。モーダルが開いていなければ何もしない。
   実行が終わっていた（停止／終了時刻到達）ら設定画面へ戻す。 */
function pomoUpdatePanel(){
  const clock = document.getElementById("p-clock"); if(!clock) return;
  const ov = clock.closest(".overlay");
  if(!pomo.running){ if(ov && ov._pomoDrawIdle) ov._pomoDrawIdle(); return; }
  const now = new Date();
  clock.textContent = pomoRemainStr(pomoTarget().getTime() - now.getTime());
  const phase = now < pomo.startAt ? "wait" : pomoPhaseAt(now);
  const phaseEl = document.getElementById("p-phase");
  phaseEl.className = "pomo-phase " + phase;
  phaseEl.textContent = phase==="wait" ? t("開始待ち") : (phase==="break" ? t("休憩中") : t("学習中"));
  const nextEl = document.getElementById("p-next");
  if(pomo.next && pomo.next.getTime() <= pomo.endAt.getTime()){
    nextEl.textContent = tf("{t} に{k}のチャイム", {t:pomoFmtHM(pomo.next), k:(pomoPhaseAt(pomo.next)==="break" ? t("休憩開始") : t("学習開始"))});
  }else{
    nextEl.textContent = tf("{t} に終了チャイム", {t:pomoFmtHM(pomo.endAt)});
  }
}

function openPomodoro(){
  const ov = document.createElement("div"); ov.className = "overlay";
  document.body.appendChild(ov);
  const close = ()=>ov.remove();
  ov.addEventListener("mousedown", e=>{ if(e.target===ov) close(); });
  let saved = {}; try{ saved = JSON.parse(localStorage.getItem("studyplan.pomodoro"))||{}; }catch(e){}

  function drawIdle(){
    const now = new Date();
    const defEnd = saved.end || pomoFmtHM(new Date(now.getTime() + 2*3600*1000));
    const hasWake = "wakeLock" in navigator;
    ov.innerHTML = `<div class="modal">
      <h2>${t("ポモドーロタイマー")}</h2>
      <div class="lead">${t("時計に揃えて、毎時 <b>0分・30分に学習開始</b>、<b>25分・55分に休憩開始</b>のチャイムが鳴ります（25分学習＋5分休憩）。アプリを開いている間だけ動きます。")}</div>
      <div class="field"><label>${t("開始")}</label>
        <div class="unit-seg">
          <input type="radio" name="pstart" id="ps-now" value="now" checked><label for="ps-now">${t("今すぐ")}</label>
          <input type="radio" name="pstart" id="ps-at" value="at"><label for="ps-at">${t("時刻を指定")}</label>
        </div>
        <input type="time" id="p-start" value="${pomoFmtHM(now)}" disabled style="margin-top:9px">
        <div class="hint">${t("指定した時刻以降のチャイムから鳴り始めます。")}</div></div>
      <div class="field"><label>${t("終了時刻")}</label>
        <input type="time" id="p-end" value="${defEnd}">
        <div class="hint">${t("終了時刻になると終了チャイムが鳴って止まります。開始より前の時刻は翌日として扱います。")}</div></div>
      ${hasWake ? `<div class="field"><label class="pomo-chk"><input type="checkbox" id="p-wake" ${saved.wake===false?"":"checked"}>${t("実行中は画面をスリープさせない")}</label>
        <div class="hint">${t("画面が消えるとチャイムが鳴らないことがあるため、実行中は画面を点けたままにします。")}</div></div>` : ""}
      <div class="err" id="p-err"></div>
      <div class="modal-actions">
        <button class="btn ghost" id="p-cancel">${t("キャンセル")}</button>
        <div class="right"><button class="btn accent" id="p-go">${t("開始する")}</button></div>
      </div>
    </div>`;
    const startInp = ov.querySelector("#p-start");
    ov.querySelectorAll('input[name=pstart]').forEach(r=>
      r.onchange = ()=>{ startInp.disabled = ov.querySelector("#ps-now").checked; });
    ov.querySelector("#p-cancel").onclick = close;
    ov.querySelector("#p-go").onclick = ()=>{
      const err = ov.querySelector("#p-err"); err.textContent = "";
      const nowD = new Date();
      const endV = ov.querySelector("#p-end").value;
      if(!endV) return err.textContent = t("終了時刻を入力してください。");
      let startAt = nowD;
      if(ov.querySelector("#ps-at").checked){
        const sv = startInp.value;
        if(!sv) return err.textContent = t("開始時刻を入力してください。");
        const [sh, sm] = sv.split(":").map(Number);
        const s = new Date(nowD); s.setHours(sh, sm, 0, 0);
        startAt = s > nowD ? s : nowD;   // 過去の時刻は「今すぐ」と同じ扱い
      }
      const [eh, em] = endV.split(":").map(Number);
      const endAt = new Date(nowD); endAt.setHours(eh, em, 0, 0);
      if(endAt.getTime() <= startAt.getTime()) endAt.setDate(endAt.getDate()+1);  // 開始以前＝翌日扱い
      const keepAwake = hasWake && ov.querySelector("#p-wake").checked;
      localStorage.setItem("studyplan.pomodoro", JSON.stringify({ end:endV, wake:keepAwake }));
      saved = { end:endV, wake:keepAwake };
      try{ if(!pomoAudioCtx) pomoAudioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){}
      pomoChime("start");   // ユーザー操作の中で一度鳴らして音を有効化（音量の確認にもなる）
      pomoStart(startAt, endAt, keepAwake);
      drawRun();
    };
  }

  function drawRun(){
    const crossDay = pomo.endAt.getDate() !== new Date().getDate();
    ov.innerHTML = `<div class="modal">
      <h2>${t("ポモドーロタイマー")}</h2>
      <div class="lead">${t("毎時 0分・30分に学習開始、25分・55分に休憩開始のチャイムが鳴ります。")}</div>
      <div class="pomo-now">
        <span class="pomo-phase" id="p-phase">—</span>
        <div class="pomo-clock" id="p-clock">--:--</div>
        <div class="pomo-next" id="p-next">—</div>
        <div class="pomo-end">${t("終了時刻")} ${pomoFmtHM(pomo.endAt)}${crossDay ? t("（翌日）") : ""}</div>
      </div>
      <div class="modal-actions">
        <button class="btn ghost" id="p-close">${t("閉じる")}</button>
        <div class="right"><button class="btn" id="p-stop">${t("停止する")}</button></div>
      </div>
    </div>`;
    ov.querySelector("#p-close").onclick = close;
    ov.querySelector("#p-stop").onclick = pomoStop;  // 停止 → pomoUpdatePanel 経由で設定画面に戻る
    pomoUpdatePanel();
  }

  ov._pomoDrawIdle = drawIdle;
  if(pomo.running) drawRun(); else drawIdle();
}

  localStorage.setItem("studyplan.theme", th);
  const b=document.getElementById("themeBtn");
  if(b){ b.textContent = th==="dark" ? t("☀ 明るく") : t("☾ 暗く"); b.title = t("テーマを切り替え"); }
}

/* 言語を切り替えて保存し、画面全体を現在言語で描き直す。 */
function applyLang(l){
  if(l!=="ja" && !I18N[l]) l="ja";
  LANG = l;
  localStorage.setItem("studyplan.lang", l);
  WD = WD_LANG[LANG] || WD_LANG.ja;
  applyStaticTexts();
  applyTheme(document.documentElement.getAttribute("data-theme")==="dark"?"dark":"light"); // ボタン文言を貼り直す
  pomoUpdateNav();
  setDateline();
  render();
}

/* boot */
/* アプリのバージョン。sw.js の CACHE = "studyplan-vNN" と必ず揃えること。 */
const APP_VERSION = "v52";
document.getElementById("appVer").textContent = APP_VERSION;
applyStaticTexts();   // ナビ等の静的文言を現在言語で貼る（初回は端末言語から自動判定）
applyTheme(localStorage.getItem("studyplan.theme")==="dark"?"dark":"light");
setDateline();
repairCollisions();   // heal plans generated before the collision fix (keeps actuals)
render();

/* ---- Android/TWA ハードウェア戻るボタン対応 ----
   このアプリはモーダルや詳細画面を URL を変えずに開くため、戻るボタンに
   「戻る先」が無く、TWA（Playアプリ）ごと終了してしまう。
   方針＝「開いている階層（モーダル＋詳細）の数」と同じだけ履歴エントリを常に
   積んでおき、戻る（popstate）が来たら最上位を1段だけ閉じる。階層を“開いた
   瞬間”にエントリを積むので、戻るボタンを連打しても実在エントリを順に消費でき、
   「控えを補充し直す」方式のような隙間（補充が間に合わず即終了）が生じない。
   階層が UI 操作（×ボタン等）で減ったら余分なエントリを1つ畳んで同期する。
   階層がゼロのときの戻るは履歴のルートなので TWA が自然に終了する。
   既存のモーダル/遷移コードは変更不要（クリック/タップ操作はそのまま動く）。 */
function uiLayerCount(){
  return document.querySelectorAll(".overlay").length + (state.selected ? 1 : 0);
}
function closeTopLayer(){
  const ovs = document.querySelectorAll(".overlay");
  if(ovs.length){ ovs[ovs.length-1].remove(); return true; }     // 開いているモーダルを閉じる
  if(state.selected){ state.selected = null; render(); return true; } // 詳細（予実表）→ 一覧へ
  return false;                                                    // 閉じる物なし＝ルート
}
let histDepth = 0;        // 階層用に積んだ履歴エントリ数（通常時 = uiLayerCount）
let suppressPop = false;  // 同期のために自分で呼んだ history.back() を無視する印
function syncHistory(){
  const want = uiLayerCount();
  while(histDepth < want){ histDepth++; history.pushState({ sp: histDepth }, ""); } // 開いた分を積む
  if(histDepth > want){    // UI 操作で階層が減った → 余分を1つ畳む（多段は popstate 後に再同期）
    histDepth--; suppressPop = true; history.back();
  }
}
window.addEventListener("popstate", ()=>{
  if(suppressPop){ suppressPop = false; syncHistory(); return; }  // 自分で畳んだ分は無視＋再同期
  if(histDepth > 0) histDepth--;
  closeTopLayer();          // 戻る＝最上位を1段閉じる（閉じる物が無ければ何もしない＝既にルート）
});
/* DOM の変化（モーダルの開閉・詳細の描画）を1フレームにまとめて履歴と同期。
   subtree 監視だが rAF でまとめるので描画中の連続変化でも syncHistory は1回。 */
let _syncPending = false;
new MutationObserver(()=>{
  if(_syncPending) return;
  _syncPending = true;
  requestAnimationFrame(()=>{ _syncPending = false; syncHistory(); });
}).observe(document.body, { childList: true, subtree: true });
syncHistory();

/* 初回のみ歓迎ガイドを自動表示（テーマと同じ端末ローカルのフラグで管理）。
   表示した時点でフラグを立てるので、戻るボタンで閉じても次回からは出さない。
   ナビの「？」からはいつでも再表示できる。 */
if(!localStorage.getItem("studyplan.onboarded")){
  localStorage.setItem("studyplan.onboarded","1");
  openOnboarding();
}

/* PWA: register the service worker for offline / installable use.
   (Only active over http(s) or localhost — ignored on file://.) */
if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("./sw.js").catch(()=>{});
  });
}
</script>
