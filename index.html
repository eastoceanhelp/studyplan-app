const PALETTE = ["#bb3c28","#2f4f64","#a8843a","#5d7a4f","#7a4f6d","#3f6e74","#9c5a2c","#4a5a8a"];

function parseExclusions(str){
  const set = new Set();
  if(!str) return set;
  str.split(/[\s,、，]+/).forEach(tok=>{
    if(!tok) return;
    const m = tok.match(/^(\d+)\s*[-~〜]\s*(\d+)$/);
    if(m){ const a=+m[1],b=+m[2]; for(let i=Math.min(a,b);i<=Math.max(a,b);i++) set.add(i); }
    else if(/^\d+$/.test(tok)) set.add(+tok);
  });
  return set;
}
function buildItems(mat){
  const ex = parseExclusions(mat.excluded);
  const items=[];
  for(let n=mat.rangeStart;n<=mat.rangeEnd;n++) if(!ex.has(n)) items.push(n);
  return items;
}
function rangeLabel(items){
  if(!items.length) return "—";
  const parts=[]; let s=items[0],p=items[0];
  for(let i=1;i<items.length;i++){
    if(items[i]===p+1){ p=items[i]; }
    else{ parts.push(s===p?`${s}`:`${s}〜${p}`); s=p=items[i]; }
  }
  parts.push(s===p?`${s}`:`${s}〜${p}`);
  return parts.join(", ");
}
function unitLabel(u){ return u==="page"?t("ページ"):t("問"); }
function parseLabelItems(label){
  if(!label || label==="—") return [];
  const out=[];
  label.split(/[,、]/).forEach(part=>{
    part=part.trim(); if(!part) return;
    const m = part.match(/^(\d+)\s*[〜~\-]\s*(\d+)$/);
    if(m){ for(let i=+m[1];i<=+m[2];i++) out.push(i); }
    else if(/^\d+$/.test(part)) out.push(+part);
  });
  return out;
}

/* Returns a predicate (date-string -> bool) that is true on excluded days,
   combining global settings with the material's own exclusions. */
function buildDayExcluder(mat){
  const g = DB.settings();
  const dates = new Set([...(g.excludeDates||[]), ...((mat&&mat.excludeDates)||[])]);
  const wds   = new Set([...(g.excludeWeekdays||[]), ...((mat&&mat.excludeWeekdays)||[])]);
  return dstr => dates.has(dstr) || wds.has(parseD(dstr).getDay());
}

/* Generates the full set of study entries for a material. Pure function. */
function generatePlan(mat){
  return distributeItems(mat, buildItems(mat), mat.startDate, mat.endDate,
    buildDayExcluder(mat), new Set(), 0);
}

/* Core distributor shared by generatePlan and replanPeriod. Places `items`
   over startDate..endDate (reserving the tail for the final chunk's reviews),
   skipping isExcluded days with the load spread over the remaining days
   (weekend-first remainder). `occupied` seeds the one-entry-per-(date×group)
   collision set — days whose "new" cell is already taken carry no new study —
   and is mutated as entries are placed. Chunk numbering starts at chunkStart.
   Returns the newly created entries only. */
function distributeItems(mat, items, startDate, endDate, isExcluded, occupied, chunkStart){
  const N = items.length;
  const start = parseD(startDate);
  const totalDays = diffDays(startDate, endDate)+1;
  if(N===0 || totalDays<=0) return [];

  // Reserve the tail of the period for the final chunk's reviews so that
  // reviews also finish by the end date: new study spans only the first
  // (totalDays - maxReviewOffset) days.
  const maxOffset = (mat.reviews&&mat.reviews.length)?Math.max(...mat.reviews):0;
  const D = Math.max(1, totalDays - maxOffset);

  // Day indices (within the new-study window) that may carry new study.
  // Excluded days (holidays / weekdays the user opted out of) and days whose
  // "new" cell is already occupied (kept entries during a replan) are skipped
  // and their load is redistributed over the remaining days. If everything is
  // excluded, fall back to using all days so a plan is still produced.
  let avail = [];
  for(let i=0;i<D;i++){ const ds=fmtD(addDays(start,i)); if(!isExcluded(ds) && !occupied.has(ds+"|new")) avail.push(i); }
  if(!avail.length){ for(let i=0;i<D;i++) avail.push(i); }
  const M = avail.length;

  // Level new-study load per available day; remainder onto weekends first.
  const base = Math.floor(N/M);
  let rem = N - base*M;
  const counts = {};
  avail.forEach(i=>counts[i]=base);
  const weekend=[], weekday=[];
  avail.forEach(i=>{ (isWeekend(addDays(start,i))?weekend:weekday).push(i); });
  const order = weekend.concat(weekday);
  let oi=0;
  while(rem>0){ counts[order[oi % order.length]]++; oi++; rem--; }

  // The 予実表 grid has exactly one cell per (date, group), where group is
  // "new" or "r<reviewIndex>". When reviews are pushed off excluded days, two
  // reviews of the SAME index (from different chunks) can land on the same day
  // and collide — the grid then shows only one but the day-total counts both,
  // so the per-day planned sum looks wrong. Track occupied (date|group) cells
  // and push a review forward until it lands on a day that is neither excluded
  // nor already taken by the same group, keeping one entry per cell.
  const entries=[]; let pos=0, chunk=chunkStart;
  for(const i of avail){
    const c = counts[i];
    if(c<=0) continue;
    const slice = items.slice(pos, pos+c); pos+=c;
    if(!slice.length) continue;
    // In the all-excluded fallback a day may already hold a kept new study —
    // push forward so the one-entry-per-(date×group) invariant survives.
    let day = addDays(start,i);
    for(let guard=0; occupied.has(fmtD(day)+"|new") && guard<2000; guard++) day = addDays(day,1);
    const label = rangeLabel(slice);
    occupied.add(fmtD(day)+"|new");
    entries.push({
      id:`${mat.id}|c${chunk}|new`, materialId:mat.id, chunkId:chunk,
      type:"new", reviewIndex:0, date:fmtD(day),
      label, items:slice.slice(), planCount:slice.length, actualCount:null, done:false
    });
    (mat.reviews||[]).forEach((off, ri)=>{
      // Place the review at its offset, then push it forward off any excluded
      // day or already-occupied same-group cell to the next free allowed day.
      const gkey = "r"+(ri+1);
      let rdate = addDays(day, off);
      for(let guard=0; (isExcluded(fmtD(rdate))||occupied.has(fmtD(rdate)+"|"+gkey)) && guard<2000; guard++) rdate = addDays(rdate, 1);
      occupied.add(fmtD(rdate)+"|"+gkey);
      entries.push({
        id:`${mat.id}|c${chunk}|r${ri}`, materialId:mat.id, chunkId:chunk,
        type:"review", reviewIndex:ri+1, date:fmtD(rdate),
        label, items:slice.slice(), planCount:slice.length, actualCount:null, done:false
      });
    });
    chunk++;
  }
  return entries;
}
/* Recompute a material's plan for a new period (bar-edge resize on the gantt).
   Entries already banked — done, or dated before `today` — are kept verbatim
   (actuals preserved); every entry of a chunk whose NEW study is banked is
   also kept (its items were already consumed), and kept entries act as
   occupied cells. Everything else is discarded and the not-yet-consumed items
   are redistributed over max(newStart,today)..newEnd with generatePlan's
   rules, chunk numbering continuing after the kept chunks. Pure (isExcluded
   and today are injected). Returns the full replacement entries array. */
function replanPeriod(mat, entries, newStart, newEnd, isExcluded, today){
  const gkey = e => e.type==="new" ? "new" : ("r"+e.reviewIndex);
  const banked = e => e.done || e.date < today;
  const keptChunk = new Set(
    entries.filter(e=>e.type==="new" && banked(e)).map(e=>e.chunkId));
  const kept = entries.filter(e=> keptChunk.has(e.chunkId) || banked(e));

  // Items consumed by kept NEW studies never reappear in the redistribution.
  const consumed = new Set();
  kept.forEach(e=>{ if(e.type==="new") (e.items||[]).forEach(n=>consumed.add(n)); });
  const remaining = buildItems(mat).filter(n=>!consumed.has(n));
  if(!remaining.length) return kept.slice();

  const occupied = new Set(kept.map(e=>e.date+"|"+gkey(e)));
  const distStart = newStart > today ? newStart : today;   // never plan into the past
  const distEnd = newEnd > distStart ? newEnd : distStart; // degenerate: stack on one day
  const nextChunk = kept.reduce((mx,e)=>Math.max(mx,e.chunkId+1), 0);
  return kept.concat(
    distributeItems(mat, remaining, distStart, distEnd, isExcluded, occupied, nextChunk));
}

const CIRCLED = ["","①","②","③","④","⑤","⑥","⑦","⑧","⑨","⑩"];
function reviewName(i){ return t("復習")+(CIRCLED[i]||i); }

/* =========================================================================
   教材リスト（CSVから読み込む）
   - アプリは参考書データを一切内蔵しない。ユーザーが用意したCSVを
     「教材リストを読み込む」で取り込み、DB.library に保存して使う。
   - 列: subject,level,step,cat,pick,par,ss,name,kana,count,unit
     必須の列は subject,level,name,count,unit（level は空でもよい）。
   - 行の並び順＝表示順。教科ごとに易→難、レベル内は取り組む順に並べる前提。
     step が空の行はセット（一括登録）に入らず、教材追加時のサジェストにだけ出る。
   - count は総ページ数（単語帳・一問一答は語数/問数で unit:"problem"）。
     選択時に 学習範囲 1〜count の初期値になる（あとから自由に変更できる）。
   ========================================================================= */
/* 教科名の読み（検索用）。教科名は一般名詞なのでアプリ側で持つ。
   ここに無い教科は教科名そのものを読みとして扱う。 */
const SUBJECT_KANA = {
  "英語":"えいご","数学":"すうがく","現代文":"げんだいぶん","古文":"こぶん",
  "漢文":"かんぶん","化学":"かがく","物理":"ぶつり","生物":"せいぶつ",
  "日本史":"にほんし","世界史":"せかいし","地理":"ちり"
};
const LIB_REQUIRED = ["subject","level","name","count","unit"];

/* 今読み込まれている教材リスト。 */
function LIB(){ return DB.libraryBooks(); }

/* CSV(RFC4180)を 行×列 に分解する。純粋関数。
   引用符の中のカンマ・改行・二重引用符("")を正しく扱う。先頭のBOMは捨てる。 */
function parseCSV(text){
  const s = String(text||"").replace(/^\uFEFF/, "");
  const rows=[]; let row=[], f="", q=false;
  for(let i=0;i<s.length;i++){
    const c=s[i];
    if(q){
      if(c!=='"') f+=c;
      else if(s[i+1]==='"'){ f+='"'; i++; }   // "" ＝エスケープされた引用符
      else q=false;
    }
    else if(c==='"') q=true;
    else if(c===","){ row.push(f); f=""; }
    else if(c==="\n"){ row.push(f); f=""; rows.push(row); row=[]; }
    else if(c!=="\r") f+=c;                   // CRLF の CR は捨てる
  }
  if(f!=="" || row.length){ row.push(f); rows.push(row); }
  return rows.filter(r=>r.some(v=>v!==""));   // 空行は捨てる
}

/* CSVテキストを教材リストに変換する。純粋関数。
   返り値 {books, errors}。errors があっても正しい行は books に入る
   ＝1行の書き間違いでファイル全体が読めなくなるのを避ける。 */
function parseLibraryCSV(text){
  const rows = parseCSV(text);
  if(!rows.length) return {books:[], errors:[t("ファイルが空です。")]};
  const head = rows[0].map(h=>h.trim().toLowerCase());
  const miss = LIB_REQUIRED.filter(c=>head.indexOf(c)<0);
  if(miss.length) return {books:[], errors:[tf("必要な列がありません: {c}",{c:miss.join(", ")})]};
  const at = (r,c)=>{ const i=head.indexOf(c); return i<0 ? "" : String(r[i]==null?"":r[i]).trim(); };
  const books=[], errors=[], seen=new Set();
  rows.slice(1).forEach((r,i)=>{
    const ln = i+2;                            // ヘッダの次＝CSV上の行番号
    const name = at(r,"name"), subject = at(r,"subject");
    const count = Number(at(r,"count")), unit = at(r,"unit");
    if(!subject){ errors.push(tf("{n}行目: 教科(subject)がありません",{n:ln})); return; }
    if(!name){ errors.push(tf("{n}行目: 書名(name)がありません",{n:ln})); return; }
    if(!(count>0)){ errors.push(tf("{n}行目: 分量(count)は1以上の数にしてください",{n:ln})); return; }
    if(unit!=="page" && unit!=="problem"){ errors.push(tf("{n}行目: unitは page か problem です",{n:ln})); return; }
    if(seen.has(name)){ errors.push(tf("{n}行目: 書名が重複しています（{b}）",{n:ln,b:name})); return; }
    seen.add(name);
    const step = Number(at(r,"step"));
    const flag = c => { const v=at(r,c).toLowerCase(); return v==="1"||v==="true"; };
    books.push({
      subject, level: at(r,"level"),
      step: step>0 ? step : null,
      cat: at(r,"cat"), pick: at(r,"pick"),
      par: flag("par"), ss: flag("ss"),
      name, kana: at(r,"kana") || name,
      count, unit
    });
  });
  return {books, errors};
}

/* 教材リストから教科の一覧を作る。純粋関数。行順＝表示順。 */
function libSubjects(books){
  const out=[], seen=new Set();
  (books||[]).forEach(b=>{
    if(b.subject && !seen.has(b.subject)){
      seen.add(b.subject);
      out.push({name:b.subject, kana:SUBJECT_KANA[b.subject]||b.subject});
    }
  });
  return out;
}

/* レベルの並び順（易→難）を教材リストから導く。純粋関数。
   各教科の中ではレベルが取り組む順に並んでいる前提で、教科をまたいでも
   相対順序が壊れないように統合する（ある教科に無いレベルがあってもよい）。 */
function libLevels(books){
  const bySub = new Map();
  (books||[]).forEach(b=>{
    if(!b.level) return;
    if(!bySub.has(b.subject)) bySub.set(b.subject, []);
    const seq = bySub.get(b.subject);
    if(!seq.includes(b.level)) seq.push(b.level);
  });
  const seqs=[]; bySub.forEach(seq=>seqs.push(seq.slice()));
  const out=[];
  for(;;){
    const heads = seqs.filter(s=>s.length).map(s=>s[0]);
    if(!heads.length) break;
    // どの教科でも「後ろに控えていない」レベル＝次に置ける
    let pick = heads.find(h=>!seqs.some(s=>s.indexOf(h)>0));
    if(pick===undefined) pick = heads[0];   // 教科間で順序が矛盾するCSV: 出現順で妥協
    out.push(pick);
    seqs.forEach(s=>{ if(s[0]===pick) s.shift(); });
  }
  return out;
}

/* 検索用の正規化: カタカナ→ひらがな、全角英数→半角、小文字化、空白・中点除去。
   カタカナ・ひらがな・全角英字のどの表記でも同じ本に当たるようにする。純粋関数。 */
function presetNorm(s){
  return String(s||"")
    .replace(/[ァ-ヶ]/g, c=>String.fromCharCode(c.charCodeAt(0)-0x60))
    .replace(/[Ａ-Ｚａ-ｚ０-９]/g, c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0))
    .toLowerCase()
    .replace(/[\s　・･]/g,"");
}

/* 入力文字列に対する候補列挙。純粋関数。
   - 教科名（または読み）が入力で始まる → その教科の全プリセットが候補
     （例:「か」→ 化学の参考書ルート一式）
   - それ以外に、書名または読みに入力を含む本も候補
     （1文字だけの入力は部分一致だと大半の本に当たってしまうので前方一致に限定）
   - 表示順は presets の配列順のまま（＝ルート順）。書名の前方一致を先頭に寄せる。 */
function presetMatch(q, presets, subjects){
  const nq = presetNorm(q);
  if(!nq) return [];
  const ps = presets||LIB();
  const subs = new Set(
    (subjects||libSubjects(ps))
      .filter(s=>presetNorm(s.name).startsWith(nq)||presetNorm(s.kana).startsWith(nq))
      .map(s=>s.name));
  const bookHit = p => nq.length>=2
    ? (presetNorm(p.name).includes(nq) || presetNorm(p.kana).includes(nq))
    : (presetNorm(p.name).startsWith(nq) || presetNorm(p.kana).startsWith(nq));
  const hit = ps.filter(p=> subs.has(p.subject) || bookHit(p));
  // 書名の前方一致（教科ヒットでないもの）を先に、残りは配列順のまま
  const starts = hit.filter(p=>!subs.has(p.subject)&&
    (presetNorm(p.name).startsWith(nq)||presetNorm(p.kana).startsWith(nq)));
  const rest = hit.filter(p=>!starts.includes(p));
  return starts.concat(rest);
}

/* =========================================================================
   教材セット（一括登録）
   ========================================================================= */
/* 教材リストからセットを組み立てる。純粋関数。書誌データは持たず、
   同じ (教科, レベル, step) の行が1つのステップ＝選択肢のまとまりになる。
   step が空の行はセットに入らない（サジェスト専用の本）。
   step: {cat:分野, books:[書名...], pick, par, ss}
   - pick "one" = 1冊を選ぶ（既定は先頭） / "any" = 必要なら追加（既定は選択なし）
     / 空 = 全冊を含める
   - par = 単語帳・熟語帳・文法語法演習など、他の教材と並行して進めるもの
   - ss  = 基礎固め（スモールステップ）教材。「基礎固めを含める」オフで除外
   返り値: {教科: [{level, steps:[...]}]}（レベルは易→難、ステップはCSVのstep順） */
function libRoutes(books){
  const routes = {};
  (books||[]).forEach(b=>{
    if(!b.step || !b.level) return;
    const lvs = routes[b.subject] || (routes[b.subject] = []);
    let lv = lvs.find(x=>x.level===b.level);
    if(!lv){ lv = {level:b.level, steps:[], _by:new Map()}; lvs.push(lv); }
    let st = lv._by.get(b.step);
    if(!st){
      st = {cat:b.cat, pick:b.pick, par:b.par, ss:b.ss, books:[], _no:b.step};
      lv._by.set(b.step, st); lv.steps.push(st);
    }
    st.books.push(b.name);
  });
  const order = libLevels(books);
  Object.keys(routes).forEach(sub=>{
    routes[sub].sort((a,b)=>order.indexOf(a.level)-order.indexOf(b.level));
    routes[sub].forEach(lv=>{
      lv.steps.sort((a,b)=>a._no-b._no);
      delete lv._by;
      lv.steps.forEach(st=>delete st._no);
    });
  });
  return routes;
}

/* 教材リストから書名で1冊引く。純粋関数。 */
function presetByName(name, presets){
  return (presets||LIB()).find(p=>p.name===name) || null;
}

/* セットに含める教材を取り組む順に解決する。純粋関数。
   route: libRoutes()[教科]、opts: {fromLevel, toLevel, includeSS, picks}
   レベルの並びは route 自身の順序（易→難）から取る。
   picks は {"<level>|<step番号>": [選んだ書名,...]}。無指定の step は pick の既定
   （one=先頭 / any=なし / 省略=全冊）。返り値: [{name, par, level, cat, key}] */
function routePlanBooks(route, opts){
  const o = opts||{};
  const LV = route.map(lv=>lv.level);
  const from = Math.max(0, LV.indexOf(o.fromLevel||LV[0]));
  const to = LV.indexOf(o.toLevel||LV[LV.length-1]);
  const out=[];
  route.forEach(lv=>{
    const li = LV.indexOf(lv.level);
    if(li<from || li>to) return;
    lv.steps.forEach((st,si)=>{
      if(st.ss && o.includeSS===false) return;
      const key = lv.level+"|"+si;
      let names;
      if(o.picks && o.picks[key]) names = st.books.filter(n=>o.picks[key].includes(n));
      else if(st.pick==="one") names = [st.books[0]];
      else if(st.pick==="any") names = [];
      else names = st.books.slice();
      names.forEach(n=>out.push({name:n, par:!!st.par, level:lv.level, cat:st.cat, key}));
    });
  });
  return out;
}

/* 期間を分量に比例して配る。純粋関数。
   books: [{name,count,unit,par}]（取り組む順）。par（単語帳など）はメインとは
   別レーンにし、どちらのレーンも全期間 start..end を直列で使う＝単語帳は他の
   教材と常に並行する。問(problem)は 1問=0.2ページ換算の目安（単語帳の語数と
   ページ数の実勢比から）。返り値は入力順の [{name,startDate,endDate,days}]。
   いずれかのレーンで冊数より日数が少なければ null。 */
const ROUTE_PROBLEM_WEIGHT = 0.2;
function routeEffort(b){ return b.count * (b.unit==="problem"?ROUTE_PROBLEM_WEIGHT:1); }
function allocateRoute(books, startDate, endDate){
  const totalDays = diffDays(startDate, endDate)+1;
  if(!(totalDays>0) || !books.length) return null;
  const res = new Map();
  for(const lane of [books.filter(b=>!b.par), books.filter(b=>b.par)]){
    if(!lane.length) continue;
    if(lane.length > totalDays) return null;
    const total = lane.reduce((s,b)=>s+routeEffort(b),0) || 1;
    let cum=0, prev=0;
    lane.forEach((b,i)=>{
      cum += routeEffort(b);
      // 比例配分の丸めで 0日の教材が出ないよう、前後から 1日ずつ最低保証する
      let bound = (i===lane.length-1) ? totalDays : Math.round(totalDays*cum/total);
      bound = Math.max(prev+1, Math.min(bound, totalDays-(lane.length-1-i)));
      res.set(b, { name:b.name, days:bound-prev,
        startDate:fmtD(addDays(parseD(startDate),prev)),
        endDate:fmtD(addDays(parseD(startDate),bound-1)) });
      prev = bound;
    });
  }
  return books.map(b=>res.get(b));
}

/* 期間に収まらない復習回を省く: 期間の半分を超えるオフセットはその教材では
   実施しない（復習の末尾予約が新規学習を初日に圧縮するのを防ぐ）。純粋関数。 */
function fitReviews(revs, totalDays){
  return (revs||[]).filter(o=>o<=Math.floor(totalDays/2));
}

/* One-time data repair for plans generated before the collision fix.
   Old generatePlan could place two reviews of the SAME index (different chunks)
   on the same day, which the 予実表 grid (one cell per date×group) can't show,
   making the per-day planned total look wrong. This pushes the duplicates
   forward to the next free, non-excluded day — WITHOUT regenerating, so any
   manually entered actuals are preserved. Idempotent; returns #entries moved. */
function repairCollisions(){
  let moved = 0;
  DB.materials().forEach(m=>{
    const isExcluded = buildDayExcluder(m);
    const byGroup = {};
    DB.entriesFor(m.id).forEach(e=>{
      const g = e.type==="new" ? "new" : ("r"+e.reviewIndex);
      (byGroup[g] = byGroup[g] || []).push(e);
    });
    Object.keys(byGroup).forEach(g=>{
      // Stable order: earlier chunk keeps its slot, later ones move forward.
      const list = byGroup[g].sort((a,b)=> (a.chunkId-b.chunkId) || a.date.localeCompare(b.date));
      const occupied = new Set();
      list.forEach(e=>{
        if(g==="new"){ occupied.add(e.date); return; } // new study never moves
        let d = e.date, guard = 0;
        while((occupied.has(d) || isExcluded(d)) && guard<2000){ d = fmtD(addDays(parseD(d),1)); guard++; }
        if(d!==e.date){ DB.updateEntry(e.id, {date:d}); moved++; }
        occupied.add(d);
      });
    });
  });
  if(moved) DB.save();
  return moved;
}

/* Pure helper for editChunkCount. Given the ordered list of per-chunk item
   counts, set chunk k to `newCount` while keeping the total N fixed: chunks
   before k are untouched; chunks after k keep their old counts but reflow to
   absorb the difference — the last surviving chunk grows when k shrinks, and
   later chunks are consumed (dropped) when k grows. Returns the new counts
   (its length may be shorter than the input = trailing chunks removed). */
function reflowCounts(counts, k, newCount, N){
  const head = counts.slice(0, k);
  const used = head.reduce((s,c)=>s+c, 0);
  newCount = Math.max(0, Math.round(newCount)||0);
  newCount = Math.min(newCount, N - used);          // can't exceed what's left
  if(newCount < 1) newCount = Math.min(1, N - used); // keep ≥1 problem if any room
  const out = head.concat([newCount]);
  let R = N - used - newCount;                       // items left for chunks after k
  const later = counts.slice(k + 1);
  for(let j=0; j<later.length && R>0; j++){
    const take = Math.min(later[j], R);
    out.push(take); R -= take;
  }
  if(R > 0){                                         // leftover items (k shrank)
    if(out.length > k + 1) out[out.length - 1] += R; // last surviving later chunk grows
    else out[k] += R;                                // no later chunks: this one grows
  }
  return out;
}

/* Edit the planned size (item count) of one chunk, preserving the material's
   total. Subsequent chunks reflow (content shifts; the last absorbs the
   difference; chunks emptied out are removed) and every affected chunk's
   reviews re-sync their range/label/count. Dates and entered actuals are kept
   in place (position-based) — unlike 再生成 which discards them. Reads/writes
   DB. Returns true if anything changed. */
function editChunkCount(materialId, chunkId, newCount){
  const mat = DB.material(materialId);
  if(!mat) return false;
  const items = buildItems(mat);
  const N = items.length;
  const es = DB.entriesFor(materialId);
  const ids = [...new Set(es.map(e=>e.chunkId))].sort((a,b)=>a-b);
  const k = ids.indexOf(chunkId);
  if(k < 0 || N === 0) return false;

  const byChunk = {};
  ids.forEach(id=> byChunk[id] = es.filter(e=>e.chunkId===id));
  const counts = ids.map(id=>{
    const nw = byChunk[id].find(e=>e.type==="new");
    return nw ? nw.planCount : (byChunk[id][0] ? byChunk[id][0].planCount : 0);
  });

  const newCounts = reflowCounts(counts, k, newCount, N);

  let pos = 0, changed = false;
  const kept = [];
  for(let i=0; i<ids.length; i++){
    const group = byChunk[ids[i]];
    if(i >= newCounts.length || newCounts[i] <= 0){ changed = true; continue; } // chunk dropped
    const slice = items.slice(pos, pos + newCounts[i]); pos += slice.length;
    const label = rangeLabel(slice);
    group.forEach(e=>{
      if(e.label !== label || e.planCount !== slice.length) changed = true;
      e.items = slice.slice();
      e.label = label;
      e.planCount = slice.length;
      e.done = e.actualCount != null && e.actualCount >= e.planCount;
      kept.push(e);
    });
  }
  if(changed) DB.saveMaterial(mat, kept);
  return changed;
}

/* Pure helper for moveChunk. Move the whole chunk `chunkId` (its 新規 + every
   復習) so the NEW study lands EXACTLY on targetDate; each review keeps its
   current offset from the new study (the chunk shifts as a block). The new study
   is placed directly on the drop target — it never silently jumps elsewhere — so
   invalid targets are REJECTED (returns []) rather than relocated: an excluded
   day carries no study, and another chunk's new must not share the day (the grid
   holds one new per day). Reviews are auto-derived, so any review landing on an
   excluded day or a cell already taken by ANOTHER chunk's same group is pushed
   forward to the next free allowed day (one entry per (date, group)). Returns the
   list of {id, date} for entries whose date changed (empty if nothing moves). */
function planChunkMove(entries, chunkId, targetDate, isExcluded){
  isExcluded = isExcluded || (()=>false);
  const gkey = e => e.type==="new" ? "new" : ("r"+e.reviewIndex);
  const moving = entries.filter(e=>e.chunkId===chunkId);
  const nw = moving.find(e=>e.type==="new");
  if(!nw) return [];
  if(targetDate===nw.date) return [];                       // no move
  // Reject invalid drop targets for the new study (stay put rather than relocate).
  if(isExcluded(targetDate)) return [];
  if(entries.some(e=>e.chunkId!==chunkId && e.type==="new" && e.date===targetDate)) return [];
  const delta = diffDays(nw.date, targetDate);
  // Cells already taken by entries that are NOT moving (one entry per date×group).
  const occupied = new Set();
  entries.forEach(e=>{ if(e.chunkId!==chunkId) occupied.add(e.date+"|"+gkey(e)); });
  occupied.add(targetDate+"|new");                          // new lands exactly here
  const updates = [{id:nw.id, date:targetDate}];
  // Reviews follow (same delta), pushed off excluded/occupied days to the next free.
  moving.filter(e=>e.type==="review").sort((a,b)=>a.date.localeCompare(b.date)).forEach(e=>{
    const g = gkey(e);
    let d = fmtD(addDays(parseD(e.date), delta));
    for(let guard=0; (isExcluded(d) || occupied.has(d+"|"+g)) && guard<2000; guard++)
      d = fmtD(addDays(parseD(d), 1));
    occupied.add(d+"|"+g);
    if(d !== e.date) updates.push({id:e.id, date:d});
  });
  return updates;
}

/* Move a whole chunk by dragging its 新規 cell to targetDate (see planChunkMove).
   Reviews follow keeping their offset; only dates change — labels/counts/actuals
   are untouched. Reads/writes DB. Returns true if anything moved. */
function moveChunk(materialId, chunkId, targetDate){
  const mat = DB.material(materialId);
  if(!mat) return false;
  const updates = planChunkMove(DB.entriesFor(materialId), chunkId, targetDate, buildDayExcluder(mat));
  if(!updates.length) return false;
  updates.forEach(u=>DB.updateEntry(u.id, {date:u.date}));
  return true;
}

/* Pure helper for swapChunks. Swap chunks `chunkA` and `chunkB` so each NEW study
   lands on the OTHER chunk's day; every 復習 follows its own chunk keeping its
   offset (both chunks shift as blocks). Both targets already hold a new study, so
   neither is an excluded day — the new studies simply exchange dates. Reviews that
   collide with an excluded day, a cell taken by a NON-swapping chunk's same group,
   or the other moving chunk's review are pushed forward to the next free allowed
   day (one entry per date×group). Returns {id,date} for entries whose date changed
   (empty for a no-op). Symmetric: swapping (A,B) equals swapping (B,A). */
function planChunkSwap(entries, chunkA, chunkB, isExcluded){
  isExcluded = isExcluded || (()=>false);
  if(chunkA===chunkB) return [];
  const gkey = e => e.type==="new" ? "new" : ("r"+e.reviewIndex);
  const newA = entries.find(e=>e.chunkId===chunkA && e.type==="new");
  const newB = entries.find(e=>e.chunkId===chunkB && e.type==="new");
  if(!newA || !newB || newA.date===newB.date) return [];
  const delta = {};
  delta[chunkA] = diffDays(newA.date, newB.date);   // A → B's day
  delta[chunkB] = diffDays(newB.date, newA.date);   // B → A's day
  // Cells already taken by entries that are NOT swapping (one entry per date×group).
  const occupied = new Set();
  entries.forEach(e=>{ if(e.chunkId!==chunkA && e.chunkId!==chunkB) occupied.add(e.date+"|"+gkey(e)); });
  const updates = [];
  occupied.add(newB.date+"|new"); updates.push({id:newA.id, date:newB.date});
  occupied.add(newA.date+"|new"); updates.push({id:newB.id, date:newA.date});
  // Both chunks' reviews follow (each by its chunk's delta), earliest target first,
  // pushed off excluded/occupied days to the next free.
  entries.filter(e=>(e.chunkId===chunkA||e.chunkId===chunkB) && e.type==="review")
    .map(e=>({e, t:fmtD(addDays(parseD(e.date), delta[e.chunkId]))}))
    .sort((x,y)=>x.t.localeCompare(y.t))
    .forEach(({e,t})=>{
      const g=gkey(e); let d=t;
      for(let guard=0; (isExcluded(d) || occupied.has(d+"|"+g)) && guard<2000; guard++)
        d = fmtD(addDays(parseD(d), 1));
      occupied.add(d+"|"+g);
      if(d !== e.date) updates.push({id:e.id, date:d});
    });
  return updates;
}

/* Swap two whole chunks by dragging one 新規 cell onto another's day (see
   planChunkSwap). Only dates change; labels/counts/actuals are untouched.
   Reads/writes DB. Returns true if anything moved. */
function swapChunks(materialId, chunkA, chunkB){
  const mat = DB.material(materialId);
  if(!mat) return false;
  const updates = planChunkSwap(DB.entriesFor(materialId), chunkA, chunkB, buildDayExcluder(mat));
  if(!updates.length) return false;
  updates.forEach(u=>DB.updateEntry(u.id, {date:u.date}));
  return true;
}

/* Pure helper for bulkShift. Shift EVERY chunk whose 新規 falls on/after fromDate
   by deltaDays (positive = later, negative = earlier); each 復習 keeps its offset
   from its own new study (chunks move as blocks). Chunks whose 新規 is before
   fromDate stay put entirely (their dates also act as obstacles). Entries are
   placed in order (earliest original new date first); any new study or review
   landing on an excluded day or a cell already taken (one entry per date×group)
   is pushed forward to the next free allowed day. Returns {id,date} for entries
   whose date changed (empty for a no-op). Backward clamping is the caller's job
   (see clampShift) — this function applies deltaDays as given. */
function planBulkShift(entries, fromDate, deltaDays, isExcluded){
  isExcluded = isExcluded || (()=>false);
  if(!deltaDays) return [];
  const gkey = e => e.type==="new" ? "new" : ("r"+e.reviewIndex);
  const isMoving = new Set(
    entries.filter(e=>e.type==="new" && e.date>=fromDate).map(e=>e.chunkId));
  if(!isMoving.size) return [];
  // Cells already taken by entries that are NOT moving (one entry per date×group).
  const occupied = new Set();
  const byChunk = {};
  entries.forEach(e=>{
    if(isMoving.has(e.chunkId)) (byChunk[e.chunkId]=byChunk[e.chunkId]||[]).push(e);
    else occupied.add(e.date+"|"+gkey(e));
  });
  const updates = [];
  const place = (e, target)=>{
    const g = gkey(e); let d = target;
    for(let guard=0; (isExcluded(d) || occupied.has(d+"|"+g)) && guard<4000; guard++)
      d = fmtD(addDays(parseD(d), 1));
    occupied.add(d+"|"+g);
    if(d !== e.date) updates.push({id:e.id, date:d});
    return d;
  };
  // Process chunks in order of their original new date so earlier chunks settle first.
  [...isMoving].sort((a,b)=>{
    const na=byChunk[a].find(e=>e.type==="new"), nb=byChunk[b].find(e=>e.type==="new");
    return na.date.localeCompare(nb.date);
  }).forEach(cid=>{
    const grp = byChunk[cid];
    const nw = grp.find(e=>e.type==="new");
    const placedNew = place(nw, fmtD(addDays(parseD(nw.date), deltaDays)));
    // Reviews keep their offset from the (possibly pushed) new study.
    grp.filter(e=>e.type==="review").sort((a,b)=>a.date.localeCompare(b.date)).forEach(rv=>{
      place(rv, fmtD(addDays(parseD(placedNew), diffDays(nw.date, rv.date))));
    });
  });
  return updates;
}

/* Effective shift for a bulk move, respecting a floor date. A forward shift
   (deltaDays>=0) is never limited. A backward shift is clamped so the earliest
   moving 新規 (on/after fromDate) does not land before floorDate. Pure. */
function clampShift(entries, fromDate, deltaDays, floorDate){
  if(deltaDays>=0) return deltaDays;
  const news = entries.filter(e=>e.type==="new" && e.date>=fromDate);
  if(!news.length) return deltaDays;
  const earliest = news.reduce((a,e)=> e.date<a ? e.date : a, news[0].date);
  const headroom = Math.max(0, diffDays(floorDate, earliest));  // days we may move back
  return Math.max(deltaDays, -headroom);
}

/* Shift all chunks from fromDate onward by deltaDays (see planBulkShift). The
   backward direction is clamped so nothing moves before today. Only dates change;
   labels/counts/actuals are untouched. Reads/writes DB. Returns
   {moved, clamped, effectiveDelta}. */
function bulkShift(materialId, fromDate, deltaDays){
  const mat = DB.material(materialId);
  if(!mat) return {moved:false, clamped:false, effectiveDelta:0};
  const entries = DB.entriesFor(materialId);
  const eff = clampShift(entries, fromDate, deltaDays, todayStr());
  const clamped = eff !== deltaDays;
  if(!eff) return {moved:false, clamped, effectiveDelta:0};
  const updates = planBulkShift(entries, fromDate, eff, buildDayExcluder(mat));
  updates.forEach(u=>DB.updateEntry(u.id, {date:u.date}));
  return {moved:updates.length>0, clamped, effectiveDelta:eff};
}

/* =========================================================================
   App state + rendering
   ========================================================================= */
const state = { view:"today", selected:null };
const viewEl = document.getElementById("view");

function setDateline(){
  const d=new Date();
  document.getElementById("todayBig").innerHTML = `<span>${d.getFullYear()}年</span> <span>${d.getMonth()+1}月${d.getDate()}日</span> <span>(${WD[d.getDay()]})</span>`;
  const en = d.toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});
  document.getElementById("todayEn").textContent = en;
}

document.getElementById("tabs").addEventListener("click", e=>{
  const b=e.target.closest("button"); if(!b || !b.dataset.view) return;
  state.view=b.dataset.view; state.selected=null;
  document.querySelectorAll("#tabs button").forEach(x=>x.classList.toggle("active",x===b));
  render();
});

function render(){
  setDateline();
  if(state.selected) return renderDetail(state.selected);
  if(state.view==="today") return renderToday();
  if(state.view==="plans") return renderPlans();
  if(state.view==="matrix") return renderMatrix();
}

/* ---------- TODAY ---------- */
function renderToday(){
  const today = todayStr();
  const tomorrow = fmtD(addDays(new Date(),1));
  const horizon = fmtD(addDays(new Date(),6)); // 今日を含め先7日
  const mats = Object.fromEntries(DB.materials().map(m=>[m.id,m]));
  const pending = DB.entries().filter(e=>!e.done && e.date<=today);
  const overdue = pending.filter(e=>e.date<today).sort((a,b)=>a.date.localeCompare(b.date));
  const now = pending.filter(e=>e.date===today);
  const future = DB.entries()
    .filter(e=>!e.done && e.date>today && e.date<=horizon)
    .sort((a,b)=>a.date.localeCompare(b.date));

  let html = `<div class="fade"><div class="section-head"><h2>${t("これから")}</h2>
    <span class="muted">${fullLabel(today)}</span></div>`;

  if(!DB.materials().length){
    html += emptyPlans()+`</div>`; viewEl.innerHTML=html; bindEmpty(); return;
  }
  if(!pending.length && !future.length){
    html += `<div class="empty-state"><div class="mark">了</div>
      <p>${t("本日およびそれ以前にやり残した学習はありません。")}</p>
      <p class="muted">${t("よく出来ました。明日の計画は「全体計画表」から確認できます。")}</p></div></div>`;
    viewEl.innerHTML=html; return;
  }
  // 教材名などの共通セル（チェック欄はcheckable/previewで差し替え）
  const cells = e => {
    const m=mats[e.materialId]; if(!m) return null;
    const typeCls = e.type==="new"?"new":"rev";
    const typeTxt = e.type==="new"?t("新規"):t("復")+(CIRCLED[e.reviewIndex]||e.reviewIndex);
    return `<span class="t-mat">${esc(m.name)}</span>
        <span class="t-type ${typeCls}">${typeTxt}</span>
        <span class="t-range">${e.label}</span>
        <span class="t-count">${e.planCount}<span style="font-family:var(--gothic);font-size:10px;color:var(--ink-faint)">${unitLabel(m.unit)}</span></span>`;
  };
  // チェック可能なブロック（今日・やり残し）
  const block = (title, list, cls) => {
    if(!list.length) return "";
    let s=`<div class="day-block ${cls}"><div class="day-label">${title}<span class="rule"></span><span class="muted">${list.length}${t("件")}</span></div>`;
    list.forEach(e=>{
      const m=mats[e.materialId]; if(!m) return;
      s+=`<div class="task" data-id="${e.id}" style="--mat:${m.color}">
        <div class="chk" data-act="toggle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        ${cells(e)}
      </div>`;
    });
    return s+`</div>`;
  };
  // プレビューブロック（翌日以降・チェック不可・日付ごと）
  const previewBlock = date => {
    const list = future.filter(e=>e.date===date);
    if(!list.length) return "";
    const d = parseD(date);
    const label = (date===tomorrow ? t("明日")+" " : "") + mdLabel(date) + " (" + WD[d.getDay()] + ")";
    let s=`<div class="day-block preview"><div class="day-label">${label}<span class="rule"></span><span class="muted">${list.length}${t("件")}</span></div>`;
    list.forEach(e=>{
      const m=mats[e.materialId]; if(!m) return;
      s+=`<div class="task preview" style="--mat:${m.color}"><div class="chk-ph"></div>${cells(e)}</div>`;
    });
    return s+`</div>`;
  };

  html += `<div class="today-grid">`;
  if(pending.length){
    html += block(t("やり残し"), overdue, "overdue");
    html += block(t("本日分"), now, "");
  } else {
    html += `<div class="today-done"><span class="mk">了</span>${t("今日の学習は完了しました。")}</div>`;
  }
  if(future.length){
    html += `<div class="preview-head">${t("この先の予定")}</div>`;
    [...new Set(future.map(e=>e.date))].sort().forEach(date=>{ html += previewBlock(date); });
  }
  html += `</div></div>`;
  viewEl.innerHTML = html;

  // チェック（実績化）はプレビュー以外のみ
  viewEl.querySelectorAll(".day-block:not(.preview) .task").forEach(t=>{
    t.querySelector(".chk").addEventListener("click", ()=>{
      const e = DB.entries().find(x=>x.id===t.dataset.id);
      const done = !e.done;
      DB.updateEntry(e.id, {done, actualCount: done ? e.planCount : null});
      renderToday();
    });
  });
}

/* ---------- PLANS ---------- */
function emptyPlans(){
  return `<div class="empty-state"><div class="mark"><svg width="62" height="62" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5.5C10.7 4.6 8.8 4 6.5 4c-1 0-2 .1-2.5.3v13.4c.6-.2 1.5-.3 2.5-.3 2.3 0 4.2.6 5.5 1.6"/><path d="M12 5.5C13.3 4.6 15.2 4 17.5 4c1 0 2 .1 2.5.3v13.4c-.6-.2-1.5-.3-2.5-.3-2.3 0-4.2.6-5.5 1.6z"/><path d="M12 5.5V19"/></svg></div>
    <p>${t("まだ教材が登録されていません。")}</p>
    <p class="muted">${t("最初の学習計画を立てましょう。")}</p>
    <div style="margin-top:22px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      <button class="btn accent" data-act="new">${t("＋ 教材を追加")}</button>
      <button class="btn ghost" data-act="routeset">${t("セットで追加")}</button>
      <button class="btn ghost" data-act="sample">${t("サンプルを作成")}</button>
      <button class="btn ghost" data-act="import">${t("⤒ バックアップから復元")}</button>
    </div></div>`;
}
function bindEmpty(){
  // The "教材を追加" and "インポート" actions appear both in the header and in
  // the empty-state body, so bind ALL matches (querySelectorAll), not just the first.
  viewEl.querySelectorAll('[data-act="new"]').forEach(n=>n.onclick=()=>openForm());
  viewEl.querySelectorAll('[data-act="import"]').forEach(im=>im.onclick=importData);
  const s=viewEl.querySelector('[data-act="sample"]'); if(s) s.onclick=createSample;
  const r=viewEl.querySelector('[data-act="routeset"]'); if(r) r.onclick=openRouteWizard;
}
function renderPlans(){
  const mats = DB.materials();
  let html = `<div class="fade"><div class="section-head"><h2>${t("学習計画一覧")}</h2>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn ghost sm" data-act="export">${t("⤓ エクスポート")}</button>
      <button class="btn ghost sm" data-act="import">${t("⤒ インポート")}</button>
      <button class="btn ghost sm" data-act="library">${t("教材リスト")}</button>
      <button class="btn ghost sm" data-act="routeset">${t("セットで追加")}</button>
      <button class="btn accent" data-act="new">${t("＋ 教材を追加")}</button>
    </div></div>`;
  if(!mats.length){ html+=emptyPlans()+`</div>`; viewEl.innerHTML=html; bindEmpty(); return; }

  html += `<div class="cards">`;
  mats.forEach(m=>{
    const es = DB.entriesFor(m.id);
    const total = es.reduce((s,e)=>s+e.planCount,0);
    const doneSum = es.reduce((s,e)=>s+(e.done?e.planCount:0),0);
    const pct = total? Math.round(doneSum/total*100):0;
    const reviews = (m.reviews||[]).length;
    html += `<div class="card" data-id="${m.id}">
      <span class="swatch" style="background:${m.color}"></span>
      <h3>${esc(m.name)}</h3>
      <div class="meta">${mdLabel(m.startDate)} 〜 ${mdLabel(m.endDate)} ・ ${m.rangeStart}〜${m.rangeEnd}${unitLabel(m.unit)} ・ ${tf("復習{n}回",{n:reviews})} ・ <b class="mstat">${doneSum}/${total}</b> ・ <b class="mstat">${pct}%</b></div>
      <div class="bar"><i style="width:${pct}%;background:${m.color}"></i></div>
    </div>`;
  });
  html += `<div class="card add" data-act="new"><div style="text-align:center"><div class="plus">＋</div><p>${t("教材を追加")}</p></div></div>`;
  html += `</div></div>`;
  viewEl.innerHTML = html;

  viewEl.querySelectorAll(".card[data-id]").forEach(c=>c.onclick=()=>{ state.selected=c.dataset.id; render(); });
  viewEl.querySelectorAll('[data-act="new"]').forEach(b=>b.onclick=()=>openForm());
  const exB=viewEl.querySelector('[data-act="export"]'); if(exB) exB.onclick=exportData;
  const imB=viewEl.querySelector('[data-act="import"]'); if(imB) imB.onclick=importData;
  const lbB=viewEl.querySelector('[data-act="library"]'); if(lbB) lbB.onclick=openLibraryImport;
  const rsB=viewEl.querySelector('[data-act="routeset"]'); if(rsB) rsB.onclick=openRouteWizard;
}

/* ---------- MATRIX (overview) ---------- */
const MATRIX_MODE_KEY = "studyplan.matrixMode"; // "day"|"week"|"month" — 端末ローカル設定（lang/theme と同方式）
function matrixMode(){
  const m = localStorage.getItem(MATRIX_MODE_KEY);
  return (m==="week"||m==="month") ? m : "day";
}
function matrixHead(mode){
  return `<div class="fade"><div class="section-head"><h2>${t("全体計画表")}</h2>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <div class="seg" id="mxseg">
        <button data-mode="day" class="${mode==='day'?'on':''}">${t("日")}</button>
        <button data-mode="week" class="${mode==='week'?'on':''}">${t("週")}</button>
        <button data-mode="month" class="${mode==='month'?'on':''}">${t("月")}</button>
      </div>
      <button class="btn accent" data-act="new">${t("＋ 教材を追加")}</button>
    </div></div>`;
}
function bindMatrixHead(){
  const nb = viewEl.querySelector('.section-head [data-act="new"]');
  if(nb) nb.onclick = ()=>openForm();
  viewEl.querySelectorAll("#mxseg button").forEach(b=>b.onclick=()=>{
    localStorage.setItem(MATRIX_MODE_KEY, b.dataset.mode); render();
  });
}
function renderMatrix(){
  const mats = DB.materials();
  const mode = matrixMode();
  let html = matrixHead(mode);
  if(!mats.length){ html+=emptyPlans()+`</div>`; viewEl.innerHTML=html; bindEmpty(); return; }
  if(mode!=="day") return renderGantt(html, mode);

  const all = DB.entries();
  if(!all.length){ html+=`<p class="muted">${t("計画がありません。")}</p></div>`; viewEl.innerHTML=html; bindMatrixHead(); return; }
  let min=all[0].date, max=all[0].date;
  all.forEach(e=>{ if(e.date<min)min=e.date; if(e.date>max)max=e.date; });
  const days=[]; for(let i=0;i<=diffDays(min,max);i++) days.push(fmtD(addDays(parseD(min),i)));
  const today = todayStr();

  // sum per material per date
  const sum = {};
  all.forEach(e=>{ (sum[e.materialId]=sum[e.materialId]||{})[e.date]=(sum[e.materialId][e.date]||0)+e.planCount; });

  let tb = `<div class="table-wrap"><table class="matrix"><thead><tr><th class="matname">${t("教材 ＼ 日付")}</th>`;
  days.forEach(d=>{
    const wd=parseD(d).getDay();
    tb+=`<th class="${isWeekend(parseD(d))?'wknd':''} ${d===today?'today':''}">${mdLabel(d)}<br/><span class="muted" style="font-size:10px">${WD[wd]}</span></th>`;
  });
  tb+=`</tr></thead><tbody>`;
  mats.forEach(m=>{
    tb+=`<tr><td class="matname" data-id="${m.id}"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${m.color};margin-right:7px"></span>${esc(m.name)}</td>`;
    days.forEach(d=>{
      const v=(sum[m.id]||{})[d]||0;
      const cls=[isWeekend(parseD(d))?'wknd':'', d===today?'today':'', v?'':'zero'].join(' ');
      tb+=`<td class="${cls}">${v?`<span class="cell-n">${v}</span>`:'·'}</td>`;
    });
    tb+=`</tr>`;
  });
  // total row
  tb+=`<tr><td class="matname" style="font-weight:700">${t("合計")}</td>`;
  days.forEach(d=>{
    let v=0; mats.forEach(m=>v+=(sum[m.id]||{})[d]||0);
    tb+=`<td class="${isWeekend(parseD(d))?'wknd':''} ${d===today?'today':''} ${v?'':'zero'}">${v?`<span class="cell-n">${v}</span>`:'·'}</td>`;
  });
  tb+=`</tr></tbody></table></div>`;
  html += tb + `<p class="muted" style="margin-top:12px">${t("数字はその日に学習する予定の合計数（新規＋復習）です。")} ${t("教材名をクリックすると予実表を開きます")}</p></div>`;
  viewEl.innerHTML = html;
  bindMatrixHead();
  viewEl.querySelectorAll("td.matname[data-id]").forEach(c=>c.onclick=()=>{ state.selected=c.dataset.id; render(); });
  // Scroll the matrix so today's column sits just right of the sticky 教材名 column
  // (past columns are kept — scroll left to see them). Non-destructive default view.
  const wrap = viewEl.querySelector(".table-wrap");
  const todayTh = viewEl.querySelector(".matrix thead th.today");
  if(wrap && todayTh){
    const corner = viewEl.querySelector(".matrix thead th.matname");
    const off = corner ? corner.offsetWidth : 0;
    wrap.scrollLeft += todayTh.getBoundingClientRect().left - wrap.getBoundingClientRect().left - off;
  }
}

/* ---------- GANTT (全体計画表の週/月ビュー) ---------- */
function renderGantt(head, mode){
  const mats = DB.materials();
  const all = DB.entries();
  const today = todayStr();
  if(!all.length){
    viewEl.innerHTML = head + `<p class="muted">${t("計画がありません。")}</p></div>`;
    bindMatrixHead(); return;
  }

  // タイムライン＝全計画期間（今日を含める）＋翌月末までの余白
  // （終了日を先へ延ばすリサイズ・後ろへの移動がその場でできるように）。
  let mn=all[0].date, mx=all[0].date;
  all.forEach(e=>{ if(e.date<mn)mn=e.date; if(e.date>mx)mx=e.date; });
  if(today<mn) mn=today; if(today>mx) mx=today;
  const cols = ganttCols(mn, nextMonthEnd(mx), mode);
  const tlStart = cols[0].start, tlEnd = cols[cols.length-1].end;
  const totalDays = diffDays(tlStart, tlEnd)+1;
  const pct = n => (n/totalDays*100).toFixed(3)+"%";

  // 見出し: 週モードは月の行＋第n週の行、月モードは「7月|8月|…」の1行。
  // 幅は日数比（月は28〜31日で不揃いのため flex-grow に日数を使う）。
  const y1=parseD(tlStart), y2=parseD(tlEnd);
  const spanLbl = tf("{y}年{m}月",{y:y1.getFullYear(),m:y1.getMonth()+1}) +
    (tlStart.slice(0,7)===tlEnd.slice(0,7) ? "" : " 〜 "+tf("{y}年{m}月",{y:y2.getFullYear(),m:y2.getMonth()+1}));
  const colCls = c => (c.start<=today && today<=c.end) ? "today" : "";
  let monRow = "";
  if(mode==="week"){
    const groups = [];
    cols.forEach(c=>{
      const g = groups[groups.length-1];
      if(g && g.month===c.month) g.days += c.days;
      else groups.push({month:c.month, days:c.days});
    });
    monRow = `<div class="g-head g-monrow"><div class="g-name"></div><div class="g-days">` +
      groups.map(g=>`<div class="g-mon" style="flex-grow:${g.days}">${tf("{m}月",{m:+g.month.slice(5)})}</div>`).join("") +
      `</div></div>`;
  }
  const colRow = `<div class="g-head"><div class="g-name">${spanLbl.length<=14?spanLbl:""}</div><div class="g-days">` +
    cols.map((c,i)=>{
      const mstart = i>0 && cols[i-1].month!==c.month;
      return `<div class="g-day ${colCls(c)} ${mstart?'g-mstart':''}" style="flex-grow:${c.days}">${c.label}</div>`;
    }).join("") + `</div></div>`;

  // 行: 背景セル（週/月区切り）＋今日の縦線＋教材バー（日数比で絶対配置）
  const cellsHtml = cols.map((c,i)=>{
    const mstart = i>0 && cols[i-1].month!==c.month;
    return `<div class="g-cell ${colCls(c)} ${mstart?'g-mstart':''}" style="flex-grow:${c.days}"></div>`;
  }).join("");
  const nowLine = `<span class="g-now" style="left:${pct(diffDays(tlStart,today)+0.5)}"></span>`;

  const byMat = {};
  all.forEach(e=>{ (byMat[e.materialId]=byMat[e.materialId]||[]).push(e); });

  let html = head + `<p class="muted" style="margin:-6px 0 10px">${spanLbl}</p>
    <div class="table-wrap gantt-wrap"><div class="gantt ${mode}" style="--cols:${cols.length}">` + monRow + colRow;

  mats.forEach(m=>{
    const es = byMat[m.id]||[];
    let barHtml = "";
    if(es.length){
      let bMin=es[0].date, bMax=es[0].date, newMax=null;
      let a=Infinity, b=-Infinity;
      es.forEach(e=>{
        if(e.date<bMin)bMin=e.date; if(e.date>bMax)bMax=e.date;
        if(e.type==="new"){
          if(newMax==null||e.date>newMax) newMax=e.date;
          e.items.forEach(n=>{ if(n<a)a=n; if(n>b)b=n; });
        }
      });
      const span = diffDays(bMin, bMax)+1;
      // 復習テール（最終新規日より後ろ）は薄く表示
      const tail = (newMax!=null && newMax<bMax)
        ? `<span class="g-tail" style="left:${((diffDays(bMin,newMax)+1)/span*100).toFixed(3)}%"></span>` : "";
      const lbl = b>=a ? (a===b? a : a+"〜"+b)+" "+unitLabel(m.unit) : t("復習");
      barHtml = `<div class="g-bar" data-id="${m.id}" data-min="${bMin}" data-max="${bMax}"
        style="--mat:${m.color};left:${pct(diffDays(tlStart,bMin))};width:${pct(span)}">
        ${tail}<span class="g-h l"></span><span class="g-lbl">${lbl}</span><span class="g-h r"></span></div>`;
    }
    html += `<div class="g-row"><div class="g-name" data-id="${m.id}" title="${esc(m.name)}"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${m.color};margin-right:7px"></span>${esc(m.name)}</div>
      <div class="g-track">${cellsHtml}${nowLine}${barHtml}</div></div>`;
  });
  html += `</div></div>
    <p class="muted" style="margin-top:12px">${t("バーをドラッグで今日以降の予定を移動、端をドラッグで期間を変更できます。教材名をタップすると予実表を開きます。")}</p></div>`;
  viewEl.innerHTML = html;

  bindMatrixHead();
  viewEl.querySelectorAll(".g-name[data-id]").forEach(c=>c.onclick=()=>{ state.selected=c.dataset.id; render(); });
  viewEl.querySelectorAll(".g-bar[data-id]").forEach(bar=>{
    bar.addEventListener("pointerdown", ev=>{ ganttDrag.down(bar, ev, totalDays); ev.preventDefault(); });
  });
  // はみ出す場合は今日の列が記名列のすぐ右に来るようスクロール（数値テーブルと同ロジック）
  const wrap = viewEl.querySelector(".gantt-wrap");
  const tc = viewEl.querySelector(".g-head .g-day.today");
  const corner = viewEl.querySelector(".g-head .g-name");
  if(wrap && tc)
    wrap.scrollLeft += tc.getBoundingClientRect().left - wrap.getBoundingClientRect().left - (corner?corner.offsetWidth:0);
}

/* Pointer-driven drag for gantt bars. Whole-bar drag shifts today-onward plans
   (bulkShift, backward clamped to today); edge drag resizes the period and
   replans the unconsumed items (replanPeriod). Pointer Events (not HTML5 DnD)
   so mouse and touch behave the same and the resize handles work; move/up
   listeners live on window so a lost capture (or a synthetic pointerId in
   tests, where setPointerCapture throws) never strands a drag. A press that
   moves less than 5px is a tap and opens the material's 予実表. */
const ganttDrag = (()=>{
  let st = null;   // active drag state
  function down(bar, ev, totalDays){
    if(st || ev.isPrimary===false) return;
    const h = ev.target.closest ? ev.target.closest(".g-h") : null;
    const track = bar.parentElement;
    const mat = DB.material(bar.dataset.id);
    if(!mat) return;
    st = {
      bar, id: bar.dataset.id, mat,
      op: h ? (h.classList.contains("l") ? "resize-l" : "resize-r") : "move",
      x0: ev.clientX, colW: track.getBoundingClientRect().width/totalDays,  // 1日ぶんの幅（スナップ単位）
      min: bar.dataset.min, max: bar.dataset.max,
      left: bar.offsetLeft, width: bar.offsetWidth,
      es: DB.entriesFor(bar.dataset.id),
      delta: 0, dragging: false
    };
    try{ bar.setPointerCapture(ev.pointerId); }catch(_){ }
  }
  function move(ev){
    if(!st) return;
    const dx = ev.clientX - st.x0;
    if(!st.dragging){
      if(Math.abs(dx) < 5) return;
      st.dragging = true;
      st.bar.classList.add("dragging");
      dragBanner.show(`<div class="dbsrc">${esc(st.mat.name)}</div><div class="dbtgt"></div>`);
    }
    dragBanner.move(ev.clientX, ev.clientY);
    const raw = Math.round(dx/st.colW);
    if(st.op==="move"){
      const eff = clampShift(st.es, todayStr(), raw, todayStr());
      st.delta = eff;
      st.bar.style.transform = `translateX(${eff*st.colW}px)`;
      const sign = eff>0 ? "+" : "";
      if(eff===0 && raw<0) dragBanner.target(t("今日より前には動かせません"), false);
      else dragBanner.target(tf("{n}日 移動",{n:sign+eff}), eff!==raw ? false : (eff!==0 ? true : null));
    }else if(st.op==="resize-r"){
      // 終了端: 今日・開始日・エントリ先頭より前には縮められない
      let floor = todayStr();
      if(st.mat.startDate>floor) floor = st.mat.startDate;
      if(st.min>floor) floor = st.min;
      const eff = Math.max(raw, diffDays(st.max, floor));
      st.delta = eff;
      st.bar.style.width = Math.max(st.colW*.6, st.width + eff*st.colW) + "px";
      dragBanner.target(tf("終了: {d}",{d:mdLabel(fmtD(addDays(parseD(st.max), eff)))}), eff!==0 ? true : null);
    }else{
      // 開始端: 終了日・エントリ末尾を越えては縮められない
      let ceil = st.mat.endDate<st.max ? st.mat.endDate : st.max;
      const eff = Math.min(raw, diffDays(st.min, ceil));
      st.delta = eff;
      st.bar.style.left = (st.left + eff*st.colW) + "px";
      st.bar.style.width = Math.max(st.colW*.6, st.width - eff*st.colW) + "px";
      dragBanner.target(tf("開始: {d}",{d:mdLabel(fmtD(addDays(parseD(st.min), eff)))}), eff!==0 ? true : null);
    }
  }
  function up(){
    if(!st) return;
    const s = st; st = null;
    dragBanner.hide();
    if(!s.dragging){ state.selected = s.id; render(); return; }   // tap → 予実表
    if(s.op==="move"){
      if(s.delta){
        const r = bulkShift(s.id, todayStr(), s.delta);
        if(r.clamped) alert(tf("前倒しは今日までに制限し、{n}日だけ前倒ししました。",{n:Math.abs(r.effectiveDelta)}));
      }
      render(); return;
    }
    // resize: 実績・過去はそのまま、未消化分だけを新期間に配り直す
    if(s.delta && confirm(t("期間を変更し、今日以降の未消化分の計画を作り直します。実績と過去の予定はそのまま残ります。よろしいですか？"))){
      const mat = s.mat;
      if(s.op==="resize-l") mat.startDate = fmtD(addDays(parseD(s.min), s.delta));
      else mat.endDate = fmtD(addDays(parseD(s.max), s.delta));
      DB.saveMaterial(mat, replanPeriod(mat, DB.entriesFor(mat.id), mat.startDate, mat.endDate,
        buildDayExcluder(mat), todayStr()));
    }
    render();
  }
  function cancel(){
    if(!st) return;
    const s = st; st = null;
    dragBanner.hide();
    s.bar.classList.remove("dragging");
    s.bar.style.transform = ""; s.bar.style.left = ""; s.bar.style.width = "";
  }
  window.addEventListener("pointermove", move);
  window.addEventListener("pointerup", up);
  window.addEventListener("pointercancel", cancel);
  return { down };
})();

/* Follow-banner shown while dragging a 予実表 cell. On phones the dragged cell
   sits under the finger, so this pinned pill (offset above the pointer) tells
   you what you're moving and which day it will land on. Created once; a single
   document-level dragover keeps it pinned to the pointer. pointer-events:none
   so it never interferes with the drag. */
const dragBanner = (()=>{
  let el=null, active=false;
  function ensure(){
    if(el) return el;
    el=document.createElement("div"); el.id="dragbanner";
    document.body.appendChild(el);
    document.addEventListener("dragover", ev=>{ if(active) move(ev.clientX, ev.clientY); });
    document.addEventListener("drop", hide);
    document.addEventListener("dragend", hide);
    return el;
  }
  function move(x,y){
    if(!x && !y) return;            // some browsers report 0,0 on the final event
    const e=ensure();
    const left=Math.min(Math.max(x, 70), window.innerWidth-70);
    e.style.left=left+"px";
    e.style.top=Math.max(8, y-64)+"px";
  }
  function show(srcHtml){ const e=ensure(); active=true; e.removeAttribute("data-state"); e.innerHTML=srcHtml; e.classList.add("on"); }
  function target(html, ok){ if(!active||!el) return; const t=el.querySelector(".dbtgt"); if(t) t.innerHTML=html;
    if(ok==null) el.removeAttribute("data-state"); else el.dataset.state=ok?"ok":"no"; }
  function hide(){ active=false; if(el) el.classList.remove("on"); }
  return {show, target, hide, move};
})();

/* ---------- DETAIL (予実表) ---------- */
function renderDetail(id){
  const m = DB.material(id);
  if(!m){ state.selected=null; return render(); }
  const es = DB.entriesFor(id);
  const reviews = (m.reviews||[]);
  const total = es.reduce((s,e)=>s+e.planCount,0);
  const doneSum = es.reduce((s,e)=>s+(e.done?e.planCount:0),0);
  const pct = total? Math.round(doneSum/total*100):0;
  const actualSum = es.reduce((s,e)=>s+(e.actualCount||0),0);

  // date span (continuous) so plans can be dragged onto empty days
  let min=es.length?es[0].date:m.startDate, max=es.length?es[0].date:m.endDate;
  es.forEach(e=>{ if(e.date<min)min=e.date; if(e.date>max)max=e.date; });
  if(m.startDate<min)min=m.startDate; if(m.endDate>max && es.length===0)max=m.endDate;
  const days=[]; for(let i=0;i<=diffDays(min,max);i++) days.push(fmtD(addDays(parseD(min),i)));
  const today=todayStr();

  // index entries by date+group, and accumulate per-day totals
  const byCell={}, dayTot={};
  es.forEach(e=>{
    const g = e.type==="new"?"new":("r"+e.reviewIndex);
    (byCell[e.date]=byCell[e.date]||{})[g]=e;
    const t = dayTot[e.date]=dayTot[e.date]||{plan:0,actual:0,hasActual:false,has:false};
    t.plan+=e.planCount; t.has=true;
    if(e.actualCount!=null){ t.actual+=e.actualCount; t.hasActual=true; }
  });

  let html = `<div class="fade"><div class="detail-head">
    <div class="detail-top">
      <div class="crumb" data-act="back">${t("‹ 計画一覧へ戻る")}</div>
      <div class="detail-actions">
        <button class="btn ghost sm" data-act="edit">${t("編集")}</button>
        <button class="btn ghost sm" data-act="shift">${t("ずらす")}</button>
        <button class="btn ghost sm" data-act="regen">${t("再生成")}</button>
        <button class="btn ghost sm" data-act="del" style="color:var(--vermilion)">${t("削除")}</button>
      </div>
    </div>
    <h2><span class="swatch" style="background:${m.color}"></span>${esc(m.name)}</h2>
    <div class="detail-meta">
      <div class="m"><div class="n">${mdLabel(m.startDate)}–${mdLabel(m.endDate)}</div><div class="l">${t("期間")}</div></div>
      <div class="m"><div class="n">${m.rangeStart}〜${m.rangeEnd}</div><div class="l">${tf("範囲({u})",{u:unitLabel(m.unit)})}</div></div>
      <div class="m"><div class="n">${reviews.length}</div><div class="l">${t("復習回数")}</div></div>
      <div class="m"><div class="n">${total}</div><div class="l">${tf("総{u}数",{u:unitLabel(m.unit)})}</div></div>
      <div class="m"><div class="n" id="progN" style="font-size:18px">${doneSum}/${total}<span style="font-size:12px"> (${pct}%)</span></div><div class="l">${t("進捗")}</div></div>
    </div>
  </div>`;

  // table
  const groups = [{key:"new",label:t("新規"),cls:"new"}].concat(reviews.map((off,i)=>({key:"r"+(i+1),label:reviewName(i+1)+`<br><span class="muted" style="font-size:10px">${tf("{n}日後",{n:off})}</span>`,cls:"rev"})));
  let tb = `<div class="table-wrap"><table class="yt"><thead><tr><th rowspan="2" class="date" style="vertical-align:middle">${t("日付")}</th>`;
  tb+=`<th colspan="2" class="grp daytot">${t("日計")}</th>`;
  groups.forEach(g=>{ tb+=`<th colspan="3" class="grp ${g.cls} colsep">${g.label}</th>`; });
  tb+=`</tr><tr>`;
  tb+=`<th class="num daytot" style="font-size:11px">${t("予")}</th><th class="num daytot" style="font-size:11px">${t("実")}</th>`;
  groups.forEach(g=>{ tb+=`<th class="colsep" style="font-size:11px">${t("範囲")}</th><th class="num" style="font-size:11px">${t("予")}</th><th class="num" style="font-size:11px">${t("実")}</th>`; });
  tb+=`</tr></thead><tbody>`;

  days.forEach(d=>{
    const wd=parseD(d).getDay();
    const wkndCls = wd===0?'wknd sun':(wd===6?'wknd sat':'');
    const dt = dayTot[d];
    tb+=`<tr data-date="${d}" class="${wkndCls} ${d===today?'today':''}">
      <td class="date">${mdLabel(d)} <span class="wd">${WD[wd]}</span></td>
      <td class="num daytot plan">${dt?dt.plan:''}</td>
      <td class="num daytot act">${dt&&dt.hasActual?dt.actual:''}</td>`;
    groups.forEach((g,gi)=>{
      const e = (byCell[d]||{})[g.key];
      const sep = 'colsep';
      if(e){
        const aCls = e.actualCount==null?'':(e.actualCount>=e.planCount?'full':(e.actualCount>e.planCount?'over':''));
        const editable = g.key==="new" ? ' editable' : '';
        tb+=`<td class="range ${g.cls} has ${sep}${editable}" draggable="true" data-id="${e.id}" data-date="${d}" data-group="${g.key}" data-chunk="${e.chunkId}"${editable?` title="${t("クリックで範囲・問数を編集")}"`:''}>${e.label}${editable?'<span class="editmark">✎</span>':''}</td>`;
        tb+=`<td class="num">${e.planCount}</td>`;
        tb+=`<td class="actual num ${aCls}"><input class="cellinput" data-id="${e.id}" data-f="actualCount" type="number" min="0" value="${e.actualCount==null?'':e.actualCount}"></td>`;
      }else{
        tb+=`<td class="range ${g.cls} ${sep}" data-date="${d}" data-group="${g.key}"></td><td class="num"></td><td class="num"></td>`;
      }
    });
    tb+=`</tr>`;
  });
  tb+=`</tbody></table></div>`;
  html += tb;
  html += `<div class="legend">
    <span><i style="background:rgba(47,79,100,.5)"></i>${t("新規学習")}</span>
    <span><i style="background:rgba(187,60,40,.5)"></i>${t("復習")}</span>
    <span><i style="background:rgba(120,160,90,.45)"></i>${t("実績が予定到達")}</span>
    <span>${t("📦 新規の学習範囲をドラッグ＝新規と復習をまとめて移動（復習のタイミングを保つ／他の新規がある日へ落とすと2つを入れ替え／除外日には置けません）")}</span>
    <span>${t("↕ 復習の範囲をドラッグ＝その復習だけ別日へ移動")}</span>
    <span>${t("✎ 新規の学習範囲をクリックすると問数を編集できます（以降が連動）")}</span>
    <span>${t("📅 ヘッダーの「ずらす」で、ある日以降の予定をまとめて前後に動かせます（復習も連動）")}</span>
    <span>${t("実績の数字はクリックして直接編集できます")}</span>
  </div>`;
  html += `<div style="margin-top:14px" class="muted">${t("実績合計")} <span id="actualSumN">${actualSum}</span> / ${t("予定合計")} ${total} ${unitLabel(m.unit)}</div></div>`;
  viewEl.innerHTML = html;

  // actions
  viewEl.querySelector('[data-act="back"]').onclick=()=>{ state.selected=null; render(); };
  viewEl.querySelector('[data-act="edit"]').onclick=()=>openForm(m);
  viewEl.querySelector('[data-act="shift"]').onclick=()=>openBulkShift(m.id);
  viewEl.querySelector('[data-act="regen"]').onclick=()=>{
    if(confirm(t("計画を再生成します。手入力した予定・実績はリセットされます。よろしいですか？"))){
      DB.saveMaterial(m, generatePlan(m)); render();
    }
  };
  viewEl.querySelector('[data-act="del"]').onclick=()=>{
    if(confirm(tf("「{name}」を削除します。よろしいですか？",{name:m.name}))){ DB.deleteMaterial(m.id); state.selected=null; state.view="plans"; render(); }
  };

  // inline edit — patch in place (no full re-render) so scroll position & focus are kept
  viewEl.querySelectorAll(".cellinput").forEach(inp=>{
    inp.addEventListener("change", ()=>{
      const e=DB.entries().find(x=>x.id===inp.dataset.id);
      if(!e) return;
      const v = inp.value===""?null:Math.max(0, Math.round(+inp.value)||0);
      DB.updateEntry(inp.dataset.id, {actualCount:v, done: v!=null && v>=e.planCount});
      inp.value = v==null?'':v; // normalize displayed value

      // 1) this actual cell's color state
      const td=inp.closest("td.actual");
      if(td){
        td.classList.remove('full','over');
        if(v!=null && v>=e.planCount) td.classList.add('full');
      }

      // 2) recompute totals from fresh data
      const es2=DB.entriesFor(id);
      const dayActual={};
      es2.forEach(x=>{ const t=dayActual[x.date]=dayActual[x.date]||{a:0,has:false}; if(x.actualCount!=null){t.a+=x.actualCount;t.has=true;} });

      // day-total 実 cell of this row
      const tr=inp.closest("tr");
      if(tr&&tr.dataset.date){
        const dcell=tr.querySelector("td.daytot.act");
        const t=dayActual[tr.dataset.date];
        if(dcell) dcell.textContent=(t&&t.has)?t.a:'';
      }

      // 3) header progress + footer 実績合計
      const total2=es2.reduce((s,x)=>s+x.planCount,0);
      const doneSum2=es2.reduce((s,x)=>s+(x.done?x.planCount:0),0);
      const pct2=total2?Math.round(doneSum2/total2*100):0;
      const actualSum2=es2.reduce((s,x)=>s+(x.actualCount||0),0);
      const pn=viewEl.querySelector("#progN"); if(pn) pn.innerHTML=`${doneSum2}/${total2}<span style="font-size:12px"> (${pct2}%)</span>`;
      const asn=viewEl.querySelector("#actualSumN"); if(asn) asn.textContent=actualSum2;
    });
  });

  // drag & drop to move a plan to another day (same column group).
  // Dragging a 新規 cell moves the WHOLE chunk (its reviews follow, keeping
  // offsets); dragging a 復習 cell nudges just that one review.
  let dragId=null, dragGroup=null, dragChunk=null;
  viewEl.querySelectorAll('td.range[draggable="true"]').forEach(cell=>{
    cell.addEventListener("dragstart", ev=>{
      dragId=cell.dataset.id; dragGroup=cell.dataset.group;
      dragChunk = cell.dataset.chunk!=null ? +cell.dataset.chunk : null;
      cell.classList.add("dragging"); ev.dataTransfer.effectAllowed="move";
      // show the follow-banner (the dragged cell hides under the finger on phones)
      const lab=cell.textContent.replace("✎","").trim();
      const isNew=dragGroup==="new";
      const gname=isNew?t("新規"):reviewName(+dragGroup.slice(1));
      const icon=isNew?"📦":"↕";
      const note=isNew?`<div class="dbnote">${t("復習も一緒に動きます")}</div>`:"";
      dragBanner.show(`<div class="dbsrc">${icon} ${gname}　${lab}</div><div class="dbtgt">${t("置く日をなぞってください")}</div>${note}`);
      dragBanner.move(ev.clientX, ev.clientY);
    });
    cell.addEventListener("dragend", ()=>{ cell.classList.remove("dragging"); dragBanner.hide(); });
  });
  // A 新規 cell can only be dropped on an allowed, free new-study day: excluded
  // days carry no study and a day already holding a new study is taken. Invalid
  // targets get no drop-ok highlight and won't accept the drop (no-drop cursor),
  // so the chunk never silently jumps elsewhere.
  const isExcludedDay = buildDayExcluder(m);
  viewEl.querySelectorAll('td.range[data-date]').forEach(cell=>{
    cell.addEventListener("dragover", ev=>{
      if(!(dragGroup && cell.dataset.group===dragGroup && cell.dataset.date)) return;
      const td=cell.dataset.date;
      const lbl=`${mdLabel(td)}（${WD[parseD(td).getDay()]}）`;
      if(dragGroup==="new"){
        if(isExcludedDay(td)){
          dragBanner.target(tf("→ {d}：ここには置けません",{d:lbl}), false); // no preventDefault → drop rejected
          return;
        }
        // A day already holding ANOTHER chunk's new study → swap the two chunks.
        const tChunk = cell.dataset.chunk!=null ? +cell.dataset.chunk : null;
        if(cell.classList.contains('has')){
          if(tChunk===dragChunk) return;       // own cell: no-op, no highlight
          ev.preventDefault(); cell.classList.add("drop-ok");
          dragBanner.target(tf("→ {d} と入れ替える",{d:lbl}), true);
          return;
        }
      }
      ev.preventDefault(); cell.classList.add("drop-ok");
      dragBanner.target(tf("→ {d} に置く",{d:lbl}), true);
    });
    cell.addEventListener("dragleave", ()=>{ cell.classList.remove("drop-ok"); dragBanner.target(t("置く日をなぞってください"), null); });
    cell.addEventListener("drop", ev=>{
      ev.preventDefault(); cell.classList.remove("drop-ok");
      if(!dragId || cell.dataset.group!==dragGroup) return;
      const targetDate=cell.dataset.date;
      if(dragGroup==="new" && dragChunk!=null){
        const tChunk = cell.dataset.chunk!=null ? +cell.dataset.chunk : null;
        if(cell.classList.contains('has') && tChunk!=null && tChunk!==dragChunk){
          // target day holds another chunk's new study → swap the two chunks
          swapChunks(id, dragChunk, tChunk);
        }else{
          // move the whole chunk: new study to targetDate, reviews follow (offset)
          moveChunk(id, dragChunk, targetDate);
        }
      }else{
        const existing=cell.dataset.id; // entry already in target cell?
        if(existing && existing!==dragId){
          // swap the two dates
          const a=DB.entries().find(x=>x.id===dragId);
          const b=DB.entries().find(x=>x.id===existing);
          const ad=a.date; DB.updateEntry(a.id,{date:b.date}); DB.updateEntry(b.id,{date:ad});
        }else{
          DB.updateEntry(dragId, {date:targetDate});
        }
      }
      dragId=null; dragGroup=null; dragChunk=null;
      renderDetail(id);
    });
  });

  // click a 新規学習 range cell to edit its planned size (range/count)
  let suppressClick=false;
  viewEl.querySelectorAll('td.range.editable').forEach(cell=>{
    cell.addEventListener("dragstart", ()=>{ suppressClick=true; });
    cell.addEventListener("click", ()=>{
      if(suppressClick){ suppressClick=false; return; } // ignore click fired by a drag
      openChunkEdit(id, +cell.dataset.chunk);
    });
  });
}

/* Modal to edit one chunk's planned size. Total is preserved; later chunks
   reflow and reviews re-sync (see editChunkCount). Actuals/dates are kept. */
function openChunkEdit(materialId, chunkId){
  const m = DB.material(materialId);
  if(!m) return;
  const es = DB.entriesFor(materialId);
  const nw = es.find(e=>e.chunkId===chunkId && e.type==="new");
  if(!nw) return;
  const u = unitLabel(m.unit);

  ov.innerHTML=`<div class="modal">
    <h2>${t("範囲・問数の編集")}</h2>
    <div class="lead">${tf("{date} の新規学習を編集します。総{u}数は変えず、<b>以降の予定（範囲・復習）が自動で連動</b>します。入力済みの実績はそのまま残ります。",{date:fullLabel(nw.date),u})}</div>
    <div style="margin-bottom:14px"><span class="muted">${t("現在の範囲")}</span>　<b>${nw.label}</b>（${nw.planCount}${u}）</div>
    <label style="display:block;font-size:13px;margin-bottom:6px">${tf("この日の予定{u}数",{u})}</label>
    <input id="ce-count" type="number" min="1" value="${nw.planCount}" style="width:120px">
    <div class="lead" style="margin-top:8px">${t("※ 増やすと後ろの予定を前倒しで取り込み、減らすと残りは後ろの日へ送られます（最終日が増減）。日数は増えません。")}</div>
    <div class="modal-actions">
      <button class="btn ghost" id="ce-cancel">${t("キャンセル")}</button>
      <div class="right"><button class="btn accent" id="ce-save">${t("保存する")}</button></div>
    </div>
  </div>`;
  document.body.appendChild(ov);
  const close=()=>ov.remove();
  ov.querySelector("#ce-cancel").onclick=close;
  ov.addEventListener("mousedown",e=>{ if(e.target===ov) close(); });
  const inp=ov.querySelector("#ce-count");

    const v=Math.max(1, Math.round(+inp.value)||0);
    editChunkCount(materialId, chunkId, v);
    close();
    renderDetail(materialId);
  };
}

/* Bulk-shift dialog: move every chunk from a chosen date onward by ±N days
   (see bulkShift). The 起点 is forced to today-or-later so past entries (with
   recorded actuals) never move, and a backward shift is clamped so nothing lands
   before today. Reviews follow their chunk; counts/actuals are untouched. */
function openBulkShift(materialId){
  const m = DB.material(materialId);
  if(!m) return;
  const today = todayStr();
  const ov=document.createElement("div"); ov.className="overlay";
  ov.innerHTML=`<div class="modal">
    <h2>${t("予定をまとめてずらす")}</h2>
    <div class="lead">${t("起点の日以降の予定（新規＋復習）を、指定した日数だけまとめて前後にずらします。復習は元のタイミングを保って追従し、<b>問数・実績はそのまま</b>です。<b>今日より前（実績のある過去）は動きません。</b>")}</div>
    <label style="display:block;font-size:13px;margin:12px 0 6px">${t("起点の日（この日以降をずらす）")}</label>
    <input id="bs-from" type="date" value="${today}" min="${today}">
    <label style="display:block;font-size:13px;margin:14px 0 6px">${t("ずらす量")}</label>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <input id="bs-days" type="number" min="1" value="1" style="width:90px"> ${t("日")}
      <select id="bs-dir">
        <option value="back">${t("後ろへ（先送り）")}</option>
        <option value="fwd">${t("前へ（前倒し）")}</option>
      </select>
    </div>
    <div class="lead" style="margin-top:10px">${t("※ 移動先が除外日になる予定は次の空き日へずれます。前倒しは、先頭の予定が今日より前にならない範囲までに制限されます。")}</div>
    <div class="modal-actions">
      <button class="btn ghost" id="bs-cancel">${t("キャンセル")}</button>
      <div class="right"><button class="btn accent" id="bs-save">${t("ずらす")}</button></div>
    </div>
  </div>`;
  document.body.appendChild(ov);
  const close=()=>ov.remove();
  ov.querySelector("#bs-cancel").onclick=close;
  ov.addEventListener("mousedown",e=>{ if(e.target===ov) close(); });
  ov.querySelector("#bs-save").onclick=()=>{
    let from = ov.querySelector("#bs-from").value || today;
    if(from < today) from = today;                 // never touch the past
    const n = Math.max(1, Math.round(+ov.querySelector("#bs-days").value)||0);
    const delta = ov.querySelector("#bs-dir").value==="back" ? n : -n;
    const r = bulkShift(materialId, from, delta);
    close();
    if(!r.moved){
      alert(r.clamped
        ? t("前倒しできる余地がありません（先頭の予定が既に今日です）。")
        : t("ずらす対象の予定がありません。起点の日を確認してください。"));
      return;
    }
    if(r.clamped) alert(tf("前倒しは今日までに制限し、{n}日だけ前倒ししました。",{n:Math.abs(r.effectiveDelta)}));
    renderDetail(materialId);
  };
}

/* Renders weekday + date exclusion controls into `container`, mutating the
   given `model` ({excludeDates:[], excludeWeekdays:[]}) in place. Reused by the
   material form (per-material) and the global exclusion dialog. */
function exclusionControls(container, model){
  function draw(){
    container.innerHTML=`
      <div class="field"><label>${t("除外する曜日")}</label>
        <div class="wd-seg" data-x="wd"></div>
        <div class="hint">${t("チェックした曜日には新規学習を入れません（土日には平日より多く配分されることがあります）。")}</div></div>
      <div class="field"><label>${t("除外する日付")}</label>
        <div class="xrow"><input type="date" data-x="date">
          <button type="button" class="btn ghost sm" data-x="add">${t("＋ 追加")}</button></div>
        <div class="chips" data-x="chips"></div>
        <div class="hint">${t("旅行・予定などで学習しない特定の日を計画から除きます。")}</div></div>`;
    const wd=container.querySelector('[data-x="wd"]');
    WD.forEach((w,i)=>{
      const b=document.createElement("button");
      b.type="button"; b.className="wd-btn"+(model.excludeWeekdays.includes(i)?" on":"");
      b.textContent=w;
      b.onclick=()=>{ const k=model.excludeWeekdays.indexOf(i); if(k>=0)model.excludeWeekdays.splice(k,1); else model.excludeWeekdays.push(i); draw(); };
      wd.appendChild(b);
    });
    const chips=container.querySelector('[data-x="chips"]');
    model.excludeDates.slice().sort().forEach(ds=>{
      const c=document.createElement("span"); c.className="xchip";
      c.innerHTML=`${fullLabel(ds)} <button type="button" title="${t("削除")}">×</button>`;
      c.querySelector("button").onclick=()=>{ const k=model.excludeDates.indexOf(ds); if(k>=0)model.excludeDates.splice(k,1); draw(); };
      chips.appendChild(c);
    });
    container.querySelector('[data-x="add"]').onclick=()=>{
      const inp=container.querySelector('[data-x="date"]'); const v=inp.value;
      if(v && !model.excludeDates.includes(v)){ model.excludeDates.push(v); draw(); }
    };
  }
  draw();
}
